  moveSpot(di,si,dir){const a=this.editing.days[di].spots,ni=si+dir;if(ni<0||ni>=a.length)return;[a[si],a[ni]]=[a[ni],a[si]];this.rerenderDays();},
  moveDay(di,dir){const a=this.editing.days,ni=di+dir;if(ni<0||ni>=a.length)return;[a[di],a[ni]]=[a[ni],a[di]];this.rerenderDays();},
  // ---- ドラッグ&ドロップ並び替え ----
  dragSpotStart(e,di,si){this._drag={kind:"spot",di,si};try{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain","s");}catch(_){}},
  dragDayStart(e,di){this._drag={kind:"day",di};try{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain","d");}catch(_){}},
  dragCardStart(e,id){this._drag={kind:"card",id};try{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain","c");}catch(_){}},
  dragEnd(){this._drag=null;document.querySelectorAll(".drag-over,.drag-over-day,.drag-over-card").forEach(x=>x.classList.remove("drag-over","drag-over-day","drag-over-card"));},
  dragOverEl(e,el){if(this._drag&&this._drag.kind==="spot"){e.preventDefault();e.stopPropagation();try{e.dataTransfer.dropEffect="move";}catch(_){}el.classList.add("drag-over");}},
  dragOverDay(e,el){if(this._drag&&this._drag.kind==="day"){e.preventDefault();try{e.dataTransfer.dropEffect="move";}catch(_){}el.classList.add("drag-over-day");}},
  dragOverCard(e,el){if(this._drag&&this._drag.kind==="card"){e.preventDefault();try{e.dataTransfer.dropEffect="move";}catch(_){}el.classList.add("drag-over-card");}},
  dragLeaveEl(e,el){el.classList.remove("drag-over","drag-over-day","drag-over-card");},
  // ---- タッチ長押しドラッグ（モバイル） ----
  initTouchDrag(){
    const self=this;const HOLD=280,THRESH=8;
    let st=null,timer=null,ghost=null,raf=0,lx=0,ly=0;
    const clearHL=()=>document.querySelectorAll(".pd-target").forEach(x=>x.classList.remove("pd-target"));
    const endGhost=()=>{if(ghost){ghost.remove();ghost=null;}};
    const stopScroll=()=>{if(raf){cancelAnimationFrame(raf);raf=0;}};
    const cancel=()=>{clearTimeout(timer);timer=null;stopScroll();document.removeEventListener("pointermove",onMove,true);document.removeEventListener("pointerup",onUp,true);document.removeEventListener("pointercancel",onUp,true);if(st&&st.grip)st.grip.classList.remove("grabbing");st=null;clearHL();endGhost();document.body.classList.remove("pd-active");};
    const hostSel=k=>k==="day"?".day-block":k==="card"?".card":k==="pack"?".chk-edit":k==="reso"?".reso-edit":".spot-edit";
    const readCtx=(k,host)=>k==="spot"?{di:+host.dataset.di,si:+host.dataset.si}:k==="day"?{di:+host.dataset.di}:k==="card"?{id:host.dataset.cardId}:k==="pack"?{i:+host.dataset.pi}:{i:+host.dataset.ri};
    const targetFor=(k,el)=>k==="spot"?(el.closest(".spot-edit")||el.closest(".day-block")):k==="day"?el.closest(".day-block"):k==="card"?el.closest(".card"):k==="pack"?el.closest(".chk-edit"):el.closest(".reso-edit");
    const kindOf=grip=>grip.classList.contains("day-drag")?"day":grip.classList.contains("card-drag")?"card":grip.classList.contains("pack-drag")?"pack":grip.classList.contains("reso-drag")?"reso":"spot";
    function scroller(){
      if(!st||!st.active){raf=0;return;}
      const h=window.innerHeight,zone=90;let dy=0;
      if(ly<zone)dy=-Math.ceil((zone-ly)/zone*18);else if(ly>h-zone)dy=Math.ceil((ly-(h-zone))/zone*18);
      if(dy)window.scrollBy(0,dy);
      raf=requestAnimationFrame(scroller);
    }
    function onDown(e){
      const grip=e.target.closest&&e.target.closest(".drag-grip");if(!grip)return;
      if(e.pointerType==="mouse")return; // マウスはネイティブDnD
      const kind=kindOf(grip);const host=grip.closest(hostSel(kind));if(!host)return;
      st={kind,grip,host,start:{x:e.clientX,y:e.clientY},active:false,ctx:readCtx(kind,host)};lx=e.clientX;ly=e.clientY;
      document.addEventListener("pointermove",onMove,true);
      document.addEventListener("pointerup",onUp,true);
      document.addEventListener("pointercancel",onUp,true);
      timer=setTimeout(()=>{
        if(!st)return;st.active=true;document.body.classList.add("pd-active");grip.classList.add("grabbing");
        const r=host.getBoundingClientRect();ghost=host.cloneNode(true);ghost.classList.add("pd-ghost");
        ghost.style.width=r.width+"px";ghost.style.left=r.left+"px";ghost.style.top=r.top+"px";
        ghost._ox=st.start.x-r.left;ghost._oy=st.start.y-r.top;document.body.appendChild(ghost);
        try{navigator.vibrate&&navigator.vibrate(12);}catch(_){}
        raf=requestAnimationFrame(scroller);
      },HOLD);
    }
    function onMove(e){
      if(!st)return;
      if(!st.active){if(Math.abs(e.clientX-st.start.x)>THRESH||Math.abs(e.clientY-st.start.y)>THRESH)cancel();return;}
      e.preventDefault();lx=e.clientX;ly=e.clientY;
      if(ghost){ghost.style.left=(e.clientX-ghost._ox)+"px";ghost.style.top=(e.clientY-ghost._oy)+"px";}
      clearHL();
      const el=document.elementFromPoint(e.clientX,e.clientY);if(!el)return;
      const tgt=targetFor(st.kind,el);if(tgt&&tgt!==st.host)tgt.classList.add("pd-target");
    }
    function onUp(e){
      if(st&&st.active){e.preventDefault();
        const el=document.elementFromPoint(lx,ly);const tgt=el&&targetFor(st.kind,el);
        if(tgt){const k=st.kind,ctx=st.ctx;
          if(k==="spot"){if(tgt.classList.contains("spot-edit"))self.reorderSpot(ctx.di,ctx.si,+tgt.dataset.di,+tgt.dataset.si);
            else self.reorderSpot(ctx.di,ctx.si,+tgt.dataset.di,(self.editing.days[+tgt.dataset.di]||{spots:[]}).spots.length);}
          else if(k==="day")self.reorderDay(ctx.di,+tgt.dataset.di);
          else if(k==="card")self.reorderCard(ctx.id,tgt.dataset.cardId);
          else if(k==="pack")self.reorderPack(ctx.i,+tgt.dataset.pi);
          else if(k==="reso")self.reorderReso(ctx.i,+tgt.dataset.ri);}
      }
      cancel();
    }
    document.addEventListener("pointerdown",onDown,true);
  },
  // 並び替えの中核（HTML5 DnD・タッチ長押しの両方から利用）
  reorderSpot(sdi,ssi,tdi,tsi){
    const src=this.editing.days[sdi],tgt=this.editing.days[tdi];if(!src||!tgt)return;
    const item=src.spots[ssi];if(!item)return;
    const tgtSpot=(tsi<tgt.spots.length)?tgt.spots[tsi]:null;
    if(item===tgtSpot)return;
    src.spots.splice(ssi,1);
    let ti;if(tgtSpot){ti=tgt.spots.indexOf(tgtSpot);if(ti<0)ti=tgt.spots.length;}else ti=tgt.spots.length;
    tgt.spots.splice(ti,0,item);
    if(!src.spots.length)src.spots.push(blankSpot());
    const crossed=sdi!==tdi;
    if(crossed)this.recomputeTrip(this.editing);
    this.rerenderDays();

  reorderDay(sdi,tdi){if(sdi===tdi)return;const days=this.editing.days;const item=days.splice(sdi,1)[0];const ti=tdi>sdi?tdi-1:tdi;days.splice(ti,0,item);this.rerenderDays();},
  reorderCard(sid,tid){if(sid===tid)return;const from=this.trips.findIndex(t=>t.id===sid),to=this.trips.findIndex(t=>t.id===tid);if(from<0||to<0)return;const item=this.trips.splice(from,1)[0];const ti=to>from?to-1:to;this.trips.splice(ti,0,item);this.save();this.go("home");},
  reorderPack(from,to){const a=this.editing.packing;if(from===to||from<0||to<0||from>=a.length||to>a.length)return;const item=a.splice(from,1)[0];const ti=to>from?to-1:to;a.splice(ti,0,item);const el=document.getElementById("packing");if(el)el.innerHTML=this.renderPackingEdit();},
  reorderReso(from,to){const a=this.editing.reservations||[];if(from===to||from<0||to<0||from>=a.length||to>a.length)return;const item=a.splice(from,1)[0];const ti=to>from?to-1:to;a.splice(ti,0,item);const el=document.getElementById("reso-list");if(el)el.innerHTML=this.renderResoEdit();},
  dragPackStart(e,i){this._drag={kind:"pack",i};try{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain","p");}catch(_){}},
  dragResoStart(e,i){this._drag={kind:"reso",i};try{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain","r");}catch(_){}},
  dragOverPack(e,el){if(this._drag&&this._drag.kind==="pack"){e.preventDefault();el.classList.add("drag-over");}},
  dragOverReso(e,el){if(this._drag&&this._drag.kind==="reso"){e.preventDefault();el.classList.add("drag-over");}},
  dropPack(e,i){e.preventDefault();const d=this._drag;this.dragEnd();if(!d||d.kind!=="pack")return;this.reorderPack(d.i,i);},
  dropReso(e,i){e.preventDefault();const d=this._drag;this.dragEnd();if(!d||d.kind!=="reso")return;this.reorderReso(d.i,i);},
  dropSpot(e,di,si){e.preventDefault();e.stopPropagation();const d=this._drag;this.dragEnd();if(!d||d.kind!=="spot")return;this.reorderSpot(d.di,d.si,di,si);},
  dropDay(e,di){e.preventDefault();const d=this._drag;this.dragEnd();if(!d||d.kind!=="day")return;this.reorderDay(d.di,di);},
  dropCard(e,id){e.preventDefault();const d=this._drag;this.dragEnd();if(!d||d.kind!=="card")return;this.reorderCard(d.id,id);},

  recomputeTrip(t){
    if(!t)return 0;
    const tp=t.pref||detectPref(t.dest||"")||"";const dm=defaultMode(t);let changed=0;
    for(const d of t.days){
      const sp=d.spots||[];if(!sp.length)continue;
      let cur=parseMin(sp[0].time);if(cur==null)cur=9*60;
      for(let i=0;i<sp.length;i++){
        const nt=fmtMin(cur);if(sp[i].time!==nt){sp[i].time=nt;changed++;}
        const stay=(sp[i].dur&&sp[i].dur>0)?sp[i].dur:defaultDur(sp[i].cat);
        let travel=0;
        if(i<sp.length-1){const s=sp[i];travel=(s.moveNext&&s.moveNext>0)?s.moveNext:estimateTravel(s,sp[i+1],tp,s.moveMode||dm);}
        cur+=stay+travel;
      }
    }
    return changed;
  },
  recompute(){
    const t=this.current();if(!t)return;
    const changed=this.recomputeTrip(t);
    t.updatedAt=Date.now();this.save();
    toast(changed?"移動手段と時間を見積もって開始時刻を組み直しました":"時刻は既に最適化されています");
    this.go("view");
  },
  setLegMode(dayId,spotId,mode){
    const t=this.current();const d=t&&t.days.find(x=>x.id===dayId);const s=d&&d.spots.find(x=>x.id===spotId);
    if(!s)return;s.moveMode=mode;this.recomputeTrip(t);t.updatedAt=Date.now();this.save();this.go("view");
  },
  // 最近傍法で各日を効率的な順に並べ替え（宿泊は末尾に固定）
  optimizeDayOrder(day,tp){const stays=day.spots.filter(s=>s.cat==="stay");const rest=day.spots.filter(s=>s.cat!=="stay");day.spots=nnOrder(rest,tp).concat(stays);},
  // 手動作成：入れたスポットを効率よく回れる日程に自動編成
  optimizeManual(){
    const t=this.editing;if(!t)return;
    const tp=t.pref||detectPref(t.dest||"")||"";
    const named=t.days.flatMap(d=>d.spots).filter(s=>s.name&&s.name.trim());
    if(named.length<2){toast("スポットを2つ以上入れてください");return;}
    const stays=named.filter(s=>s.cat==="stay"),places=named.filter(s=>s.cat!=="stay");
    const ordered=nnOrder(places,tp);
    const nD=Math.max(1,t.days.length);
    const base=Math.floor(ordered.length/nD),extra=ordered.length%nD;
    let idx=0;
    for(let i=0;i<nD;i++){const cnt=base+(i<extra?1:0);t.days[i].spots=ordered.slice(idx,idx+cnt);idx+=cnt;}
    // 各日に宿泊を戻す（最終日以外）
    let si=0;for(let i=0;i<nD-1&&si<stays.length;i++){t.days[i].spots.push(stays[si++]);}
    for(const d of t.days)if(!d.spots.length)d.spots.push(blankSpot());
    this.recomputeTrip(t);
    this.go("edit");
    toast("行きたい場所を効率よく回れる順に日程化しました");
  },
  // おすすめプラン：より効率のよい日程に更新
  optimizePlans(){
    if(!this._plans||!this._plans.length)return;
    for(const p of this._plans){const tp=p.pref||detectPref(p.dest||"")||"";for(const d of p.days)this.optimizeDayOrder(d,tp);this.recomputeTrip(p);}
    this.go("plans");
    toast("各プランを効率のよい訪問順に更新しました");
  },
  toggleTripFav(id){const t=this.trips.find(x=>x.id===id);if(!t)return;t.fav=!t.fav;t.updatedAt=Date.now();this.save();toast(t.fav?"★ お気に入りに追加しました":"お気に入りを解除しました");this.go(this.view);},
  toggleSpotFav(dayId,spotId){const t=this.current();const d=t&&t.days.find(x=>x.id===dayId);const s=d&&d.spots.find(x=>x.id===spotId);if(!s)return;s.fav=!s.fav;t.updatedAt=Date.now();this.save();toast(s.fav?"★ お気に入りスポットに追加":"お気に入りを解除");this.go(this.view);},
  toggleFavFilter(){this._favOnly=!this._favOnly;this.go("home");},
  setSearch(q){this._q=q;this.applySearchFilter();},
  applySearchFilter(){
    if(this.view!=="home")return;const grid=document.querySelector("#main .grid");if(!grid)return;
    const ql=(this._q||"").trim().toLowerCase();let shown=0;
    grid.querySelectorAll(".card").forEach(card=>{const t=this.trips.find(x=>x.id===card.dataset.cardId);const okv=!ql||(t&&this.matchQuery(t,ql));card.style.display=okv?"":"none";if(okv)shown++;});
    let em=document.getElementById("home-empty-q");
    if(ql&&shown===0){if(!em){em=document.createElement("p");em.id="home-empty-q";em.className="section-sub";em.style.textAlign="center";grid.parentNode.insertBefore(em,grid);}em.textContent=`「${this._q}」に一致するしおりはありません。`;}
    else if(em){em.remove();}
    const cnt=document.getElementById("home-count");if(cnt)cnt.textContent=ql?`・「${this._q}」${shown}件`:"";
  },
  matchQuery(t,q){if(!q)return true;q=q.toLowerCase();const hay=[t.title,t.dest,t.members,t.notes].join(" ").toLowerCase();if(hay.includes(q))return true;return (t.days||[]).some(d=>(d.spots||[]).some(s=>String(s.name||"").toLowerCase().includes(q)||String(s.addr||"").toLowerCase().includes(q)));},
  duplicateTrip(id){
    const t=this.trips.find(x=>x.id===id);if(!t)return;
    const c=JSON.parse(JSON.stringify(t));
    c.id=uid();c.title=(t.title||"しおり")+"（コピー）";c.fav=false;c.sample=false;c.createdAt=c.updatedAt=Date.now();
    (c.days||[]).forEach(d=>{d.id=uid();(d.spots||[]).forEach(s=>{s.id=uid();});});
    (c.packing||[]).forEach(p=>p.id=uid());(c.reservations||[]).forEach(r=>r.id=uid());
    const idx=this.trips.findIndex(x=>x.id===id);this.trips.splice(idx+1,0,c);this.save();
    this.currentId=c.id;toast("しおりを複製しました");this.go("view");
  },
  printTrip(){window.print();},
  setHomeSort(v){this._sortHome=v;saveHomeSort(v);this.go("home");},
  setFavSort(v){this._sortFav=v;this.go("favs");},
  sortTrips(list){
    const mode=this._sortHome||loadHomeSort();const byU=(a,b)=>b.updatedAt-a.updatedAt;
    if(mode==="manual")return list.slice();
    if(mode==="updated")return list.sort(byU);
    if(mode==="name")return list.sort((a,b)=>String(a.title||"").localeCompare(String(b.title||""),"ja")||byU(a,b));
    if(mode==="date")return list.sort((a,b)=>String(a.start||"9999-99-99").localeCompare(String(b.start||"9999-99-99"))||byU(a,b));
    return list.sort((a,b)=>(b.fav?1:0)-(a.fav?1:0)||byU(a,b));
  },
  favoriteSpots(){
    const out=[];
    for(const t of this.trips){const tp=t.pref||detectPref(t.dest||"")||"";
      (t.days||[]).forEach((d)=>(d.spots||[]).forEach(s=>{if(s.fav)out.push({s,t,day:d,pref:detectPrefSmart(s.addr,tp),city:detectCity(s.addr||"")});}));}
    return out;
  },

  toggleVisit(dayId,spotId){
    const t=this.current();const d=t.days.find(x=>x.id===dayId);const s=d&&d.spots.find(x=>x.id===spotId);
    if(!s)return;
    const before=this.computeGeo();const beforeAch=this.earnedAchievements(before);
    s.visited=!s.visited;s.visitedAt=s.visited?nowStamp():null;t.updatedAt=Date.now();this.save();
    if(s.visited){
      const after=this.computeGeo();
      const nc=[...after.countries].filter(x=>!before.countries.has(x));
      const np=[...after.prefs].filter(x=>!before.prefs.has(x));
      const nci=[...after.cities].filter(x=>!before.cities.has(x));
      if(nc.length){this.celebrate(true);toast("🎊 "+nc[0]+" に上陸！記念すべき初訪問🌍");this.recordMilestone("country","初上陸："+nc[0]);}
      else if(np.length){this.celebrate();toast("🎊 "+np[0]+" を制覇！スタンプ獲得");this.recordMilestone("pref","初制覇："+np[0]);}
      else if(nci.length){toast("🏅 新しいスタンプ："+nci[0].split("｜")[1]);this.recordMilestone("city","初訪問："+nci[0].replace("｜"," "));}
      else toast("スタンプを記録しました");
      // 実績アンロック
      const newAch=this.earnedAchievements(after).filter(a=>!beforeAch.some(b=>b.id===a.id));
      if(newAch.length){this.celebrate(true);setTimeout(()=>toast("🏅 実績解除："+newAch[0].label),700);newAch.forEach(a=>this.recordMilestone("badge","実績："+a.label));}
    }
    this.go(this.view);
  },
  togglePack(i){const t=this.current();if(!t.packing[i])return;t.packing[i].done=!t.packing[i].done;t.updatedAt=Date.now();this.save();this.go("view");},

  toggleReso(i){const t=this.current();if(!t.reservations||!t.reservations[i])return;t.reservations[i].done=!t.reservations[i].done;t.updatedAt=Date.now();this.save();this.go("view");},

  /* ---------- 制覇マップ（全しおり横断で自動集計） ---------- */
  computeGeo(){
    const countries=new Set(),prefs=new Set(),cities=new Set(),recent=[];
    for(const t of this.trips){
      const country=(t.country||"日本").trim()||"日本";
      const tripPref=t.pref||detectPref(t.dest||"")||"";
      let any=false;
      for(const d of (t.days||[]))for(const s of (d.spots||[])){
        if(s.visited){any=true;
          const sp=detectPrefSmart(s.addr,tripPref);       // 住所（市区町村名からも逆引き）で都道府県判定
          const c=detectCity(s.addr||"");                  // 住所から市区町村を自動判定
          if(country==="日本"&&sp&&PREFS.some(p=>p.n===sp))prefs.add(sp);
          if(c&&sp)cities.add(sp+"｜"+c);
          recent.push({name:s.name||"スポット",date:s.visitedAt||"",trip:t.title||"",pref:sp});
        }
      }
      if(any){countries.add(country);if(country==="日本"&&tripPref&&PREFS.some(p=>p.n===tripPref))prefs.add(tripPref);}
    }
    recent.sort((a,b)=>String(b.date).localeCompare(String(a.date)));
    return {countries,prefs,cities,recent};
  },
  renderRally(){
    const geo=this.computeGeo();
    const done=geo.prefs.size,total=PREFS.length,pct=Math.round(done/total*100);
    const mode=this._mapMode||"japan";
    // 世界：訪問国の対応
    const worldSet=new Set();const otherCountries=[];
    [...geo.countries].forEach(g=>{const m=matchWorld(g);if(m)worldSet.add(m);else otherCountries.push(g);});

    const hero=`<div class="rally-hero">
        <h2>🗺 制覇マップ</h2>
        <div class="sub">訪れた場所のスタンプが自動で集まり、地図が塗りつぶされます</div>
        <div class="geo-stats">
          <div class="geo-stat"><b><span data-count="${geo.countries.size}">${geo.countries.size}</span></b><small>国</small></div>
          <div class="geo-stat"><b><span data-count="${done}">${done}</span><span>/${total}</span></b><small>都道府県</small></div>
          <div class="geo-stat"><b><span data-count="${geo.cities.size}">${geo.cities.size}</span></b><small>市町村</small></div>
        </div>
        <div class="map-toggle">
          <button class="mt-btn ${mode==="japan"?"on":""}" onclick="App.setMapMode('japan')">🗾 日本地図</button>
          <button class="mt-btn ${mode==="world"?"on":""}" onclick="App.setMapMode('world')">🌏 世界地図</button>
        </div>
      </div>`;

    if(mode==="world")return hero+this.renderWorldMap(geo);

    // ---- 日本地図（実SVG・都道府県）----
    const MD=window.MAPDATA||{};
    const prefSvg=(MD.prefPaths||[]).map(p=>{
      const on=geo.prefs.has(p.n);const sel=this._selPref===p.n;
      return `<path class="gp ${on?"on":""} ${sel?"sel":""}" d="${p.d}" tabindex="0" onclick="App.selectPref('${p.n}')"><title>${esc(p.n)}${on?"（制覇）":""}</title></path>`;
    }).join("");
    // お気に入りスポット集計（日本国内）＆地図マーカー
    const favByPref={map:{},count:0};
    this.favoriteSpots().forEach(f=>{if(f.t.country&&f.t.country!=="日本"&&!detectPref(f.s.addr||""))return;const p=f.pref||"";(favByPref.map[p]=favByPref.map[p]||[]).push(f.s.name||"（無題）");favByPref.count++;});
    const FAVMARK=Object.keys(favByPref.map).map(p=>{const c=prefCentroid(p);if(!c)return"";return `<text class="favmark" x="${c[0]}" y="${c[1]}" style="font-size:58px" text-anchor="middle" dominant-baseline="central">★</text>`;}).join("");
    const jpmap0=`<svg viewBox="${MD.vbJP||"0 0 2000 2000"}" class="geomap jpsvg" role="img" aria-label="日本 制覇マップ ${done}/${total}">${prefSvg}${FAVMARK}</svg>`;
    const jpmap=jpmap0;
    const muniPanel=this._selPref?this.renderMuni(this._selPref,geo):"";
    const regionBars=REGIONS.map(r=>{const list=PREFS.filter(p=>p.r===r);const d=list.filter(p=>geo.prefs.has(p.n)).length;const rp=Math.round(d/list.length*100);
      return `<div class="reg-row"><span class="reg-name">${r}</span><div class="progress" style="flex:1"><i style="width:${rp}%"></i></div><span class="reg-num">${d}/${list.length}</span></div>`;}).join("");
    const cityByPref={};[...geo.cities].forEach(c=>{const[p,city]=c.split("｜");(cityByPref[p]=cityByPref[p]||[]).push(city);});
    const cityBlocks=Object.keys(cityByPref).length?Object.keys(cityByPref).map(p=>`<div class="city-block"><b>${esc(p)}</b> <span>${cityByPref[p].map(c=>`<span class="geo-chip on sm">${esc(c)}</span>`).join("")}</span></div>`).join(""):`<p style="color:var(--text-muted);font-size:13px">スポットの住所（〜市／区／町／村）から自動で貯まります。</p>`;
    const recent=geo.recent.slice(0,8);
    const recentHtml=recent.length?`<div class="subsection-title" style="margin-top:26px">🏅 最近のスタンプ</div>
      <div class="recent-list">${recent.map(r=>`<div class="recent-item"><span class="rc-emoji">📍</span><div><b>${esc(r.name)}</b><small>${esc(r.pref||"")}${r.date?" ・ "+esc(r.date):""}</small></div></div>`).join("")}</div>`:"";
    const favHtml=favByPref.count?`<div class="subsection-title" style="margin-top:26px">★ お気に入りスポット（${favByPref.count}）</div>
      <div class="fav-map-list">${Object.keys(favByPref.map).map(p=>`<div class="city-block"><b>★ ${esc(p||"地域未判定")}</b> <span>${favByPref.map[p].map(n=>`<span class="geo-chip fav sm">${esc(n)}</span>`).join("")}</span></div>`).join("")}</div>`:"";
    const emptyNote=done===0&&geo.countries.size===0?`<p class="section-sub" style="text-align:center">しおりのスポットで「訪問する」を押すと、その国・都道府県・市町村のスタンプが自動でここに貯まります。</p>`:"";
    return hero+`${emptyNote}
      <div class="map-wrap">${jpmap}</div>
      <p class="map-hint">都道府県をタップすると市区町村まで表示。塗りつぶし＝訪問済み、★＝お気に入りがある地域。</p>
      ${done>0?`<div class="replay-bar"><button class="btn ghost" onclick="App.replayConquest()">▶ 制覇の記録を再生</button><span class="replay-count">${done}/${total}</span></div>`:""}
      <div class="btn-row" style="justify-content:center;margin:6px 0 2px"><button class="btn ghost" onclick="App.conquestImage()">📤 制覇率シェアカードを作成</button></div>

      ${favHtml}
      ${this.renderAchievements(geo)}
      ${this.renderMilestones()}
      <div class="subsection-title" style="margin-top:26px">📊 地域ごとの制覇</div><div class="reg-list">${regionBars}</div>
      <div class="subsection-title" style="margin-top:26px">🌏 訪れた国</div><div class="geo-chips">${[...geo.countries].map(c=>`<span class="geo-chip on">${c==="日本"?"🗾":"🌏"} ${esc(c)}</span>`).join("")||'<span class="geo-chip">まだありません</span>'}</div>
      <div class="subsection-title" style="margin-top:26px">🏘 訪れた市町村（${geo.cities.size}）</div>${cityBlocks}
      ${recentHtml}
      <p class="map-credit">地図データ：国土数値情報（国土交通省）を加工／世界地図：Natural Earth</p>`;
  },
  renderMuni(pref,geo){
    const MD=window.MAPDATA||{};const list=(MD.muni||{})[pref]||[];const vb=(MD.muniBBox||{})[pref]||MD.vbJP;
    const on=geo.prefs.has(pref);
    const tokens=[...geo.cities].filter(c=>c.startsWith(pref+"｜")).map(c=>c.split("｜")[1]).filter(Boolean);
    const isOn=nm=>tokens.some(t=>t===nm||nm.includes(t)||t.includes(nm));
    const head=`<div class="panel-head"><h3>${esc(pref)} の市区町村 ${on?'<span class="geo-chip on sm">制覇 ✓</span>':'<span class="geo-chip sm">未踏</span>'}</h3><button class="close-x" onclick="App.selectPref('${pref}')">✕</button></div>`;
    if(!list.length)return `<div class="panel">${head}<p style="color:var(--text-muted);font-size:13px;margin:0">この地域の市区町村データがありません。</p></div>`;
    const paths=list.map(m=>{const o=isOn(m.nm);return `<path class="gp muni ${o?"on":""}" d="${m.d}"><title>${esc(m.nm)}${o?"（訪問済み）":""}</title></path>`;}).join("");
    // お気に入りスポットの市区町村に★
    const favCities=[...new Set(this.favoriteSpots().filter(f=>f.pref===pref&&f.city).map(f=>f.city))];
    const _fs=Math.max(5,Math.min(42,(parseFloat(String(vb).split(" ")[2])||300)*0.06));
    const favMark=favCities.map(city=>{const xy=muniCentroid(pref,city);return xy?`<text class="favmark sm" x="${xy[0]}" y="${xy[1]}" style="font-size:${_fs}px" text-anchor="middle" dominant-baseline="central">★</text>`:"";}).join("");
    const uniq=[...new Set(list.filter(m=>isOn(m.nm)).map(m=>m.nm))];
    return `<div class="panel muni-panel">${head}
      <div class="map-wrap"><svg viewBox="${vb}" class="geomap munisvg" role="img" aria-label="${esc(pref)} 市区町村マップ">${paths}${favMark}</svg></div>
      ${favCities.length?`<p style="font-size:12px;color:var(--text-muted);margin:6px 0 2px">★ お気に入り：${favCities.map(c=>esc(c)).join("・")}</p>`:""}
      <p style="font-size:12.5px;color:var(--text-muted);margin:8px 0 4px">訪れた市区町村（${uniq.length}）：色つき＝訪問済み（しおりの住所から自動反映）</p>
      <div class="geo-chips">${uniq.length?uniq.map(c=>`<span class="geo-chip on sm">${esc(c)}</span>`).join(""):'<span class="geo-chip sm">まだありません</span>'}</div></div>`;
  },
  renderWorldMap(geo){
    const MD=window.MAPDATA||{};const paths=MD.worldPaths||[];
    const countries=[...geo.countries];
    const isOn=n=>!!n&&countries.some(g=>g===n||g.includes(n)||n.includes(g));
    const svg=paths.map(w=>{const o=w.n&&isOn(w.n);const sel=this._selWorld===w.n;
      const click=w.n?` tabindex="0" onclick="App.selectWorld('${w.n}')"`:"";
      return `<path class="gp ${o?"on":""} ${sel?"sel":""}" d="${w.d}"${click}><title>${esc(w.n||w.en)}${o?"（訪問済み）":""}</title></path>`;}).join("");
    const wm=`<svg viewBox="${MD.vbW||"0 0 1000 520"}" class="geomap worldsvg" role="img" aria-label="世界 制覇マップ">${svg}</svg>`;
    const fillable=paths.filter(w=>w.n).map(w=>w.n);
    const filled=countries.filter(g=>fillable.some(n=>g===n||g.includes(n)||n.includes(g)));
    const others=countries.filter(g=>!filled.includes(g));
    const worldSet=new Set();countries.forEach(g=>{const m=matchWorld(g);if(m)worldSet.add(m);});
    const contBars=CONTINENTS.map(r=>{const l=WORLD.filter(c=>c.r===r);const d=l.filter(c=>worldSet.has(c.n)).length;const rp=Math.round(d/l.length*100);
      return `<div class="reg-row"><span class="reg-name">${r}</span><div class="progress" style="flex:1"><i style="width:${rp}%"></i></div><span class="reg-num">${d}/${l.length}</span></div>`;}).join("");
    let detail="";
    if(this._selWorld){const c=this._selWorld;const o=isOn(c);
      detail=`<div class="panel" style="margin-top:16px"><div class="panel-head"><h3>${esc(c)} ${o?'<span class="geo-chip on sm">訪問済み ✓</span>':'<span class="geo-chip sm">未訪問</span>'}</h3><button class="close-x" onclick="App.selectWorld('${c}')">✕</button></div><p style="color:var(--text-muted);font-size:13px;margin:0">${o?"この国を訪れました。":"この国のしおりで「訪問する」を押すと塗りつぶされます（しおりの「国」欄に国名を入れてください）。"}</p></div>`;}

  _svgToPng(svg,w,h){return new Promise((res,rej)=>{try{
    const url="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);
    const img=new Image();img.onload=()=>{const cv=document.createElement("canvas");cv.width=w;cv.height=h;const ctx=cv.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);res(cv.toDataURL("image/png"));};img.onerror=rej;img.src=url;
  }catch(e){rej(e);}});},
  _cssVars(){const cs=getComputedStyle(document.documentElement);const g=n=>cs.getPropertyValue(n).trim()||"#333";

  async _sharePng(png,fname,title){try{

  /* ---------- カレンダー(.ics)書き出し ---------- */
  exportIcs(){
    const t=this.current();if(!t)return;
    const pad=n=>String(n).padStart(2,"0");
    const fmt=(date,time,addMin)=>{const[y,mo,dd]=date.split("-").map(Number);let[hh,mi]=(time||"9:00").split(":").map(Number);let base=new Date(y,mo-1,dd,hh||9,mi||0);if(addMin)base=new Date(base.getTime()+addMin*60000);return `${base.getFullYear()}${pad(base.getMonth()+1)}${pad(base.getDate())}T${pad(base.getHours())}${pad(base.getMinutes())}00`;};
    const esc3=s=>String(s||"").replace(/([,;\\])/g,"\\$1").replace(/\n/g,"\\n");
    let ev=[];let count=0;
    t.days.forEach(d=>{if(!d.date)return;(d.spots||[]).forEach(s=>{if(!s.name||s.cat==="move")return;count++;
      const dur=(s.dur&&s.dur>0)?s.dur:defaultDur(s.cat)||60;
      ev.push(["BEGIN:VEVENT",`UID:${uid()}@tabi-shiori`,`DTSTART:${fmt(d.date,s.time,0)}`,`DTEND:${fmt(d.date,s.time,dur)}`,`SUMMARY:${esc3(s.name)}`,s.addr?`LOCATION:${esc3(s.addr)}`:"",s.memo?`DESCRIPTION:${esc3(s.memo)}`:"","END:VEVENT"].filter(Boolean).join("\r\n"));});});
    if(!count){toast("日付と時刻のあるスポットがありません（各日に日付を設定してください）");return;}
    const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//tabi-shiori//JP","CALSCALE:GREGORIAN",...ev,"END:VCALENDAR"].join("\r\n");
    const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${(t.title||"trip").replace(/\s+/g,"_")}.ics`;a.click();URL.revokeObjectURL(a.href);
    toast(`カレンダー(${count}件)を書き出しました`);
  },

  async handleFiles(fileList){
    const files=[...fileList].filter(f=>f.type.startsWith("image/"));
    if(!files.length){toast("画像ファイルを選んでください");return;}
    const t=this.current();const day=document.getElementById("al-day")?document.getElementById("al-day").value:"";
    toast(`${files.length}枚を処理中…`);let ok=0;
    for(const f of files){try{const dataUrl=await fileToDataUrl(f);
      await PhotoStore.add({id:uid(),tripId:t.id,dataUrl,caption:"",day:day||"",createdAt:Date.now()});ok++;
    }catch(e){}}
    t.updatedAt=Date.now();this.save();toast(`${ok}枚を追加しました`);this.loadAlbum();
  },
  async deletePhoto(id){await PhotoStore.remove(id);toast("写真を削除しました");this.loadAlbum();},
  async savePhotoCaption(id,text){
    const t=this.current();const list=await PhotoStore.listByTrip(t.id);const p=list.find(x=>x.id===id);
    if(!p)return;const cap=text==="キャプションを追加…"?"":text.trim();if(p.caption===cap)return;
    p.caption=cap;await PhotoStore.add(p);
  },
  openLightbox(idx){
    const ps=this._albumPhotos||[];if(!ps.length)return;this._lightPhotos=ps;this._lightIdx=idx;this.renderLightbox();
  },
  renderLightbox(){
    const p=this._lightPhotos[this._lightIdx];if(!p){this.closeLightbox();return;}
    document.getElementById("lightbox-root").innerHTML=`<div class="lightbox" onclick="if(event.target===this)App.closeLightbox()">
      <button class="lb-x" onclick="App.closeLightbox()">✕</button>
      ${this._lightPhotos.length>1?`<button class="lb-nav lb-prev" onclick="App.lightStep(-1)">‹</button><button class="lb-nav lb-next" onclick="App.lightStep(1)">›</button>`:""}
      <img src="${p.dataUrl}" alt="${esc(p.caption||"")}">
      <div class="lb-cap">${p.day?`Day ${esc(String(p.day))} ・ `:""}${esc(p.caption||"")} <span style="opacity:.6">（${this._lightIdx+1}/${this._lightPhotos.length}）</span></div></div>`;
  },
  lightStep(d){if(!this._lightPhotos.length)return;this._lightIdx=(this._lightIdx+d+this._lightPhotos.length)%this._lightPhotos.length;this.renderLightbox();},
  closeLightbox(){this._lightPhotos=[];document.getElementById("lightbox-root").innerHTML="";},

  /* ---------- テーマ ---------- */
  renderThemes(){
    const cur=loadAppTheme();const t=this.current();
    const groups=["定番","季節","雰囲気"];
    const sections=groups.map(g=>{
      const cards=THEMES.filter(th=>th.grp===g).map(th=>{const active=th.id===cur;
        return `<button class="theme-card" data-theme="${th.id}" aria-pressed="${active}" onclick="App.pickTheme('${th.id}')">
          <div class="tc-preview" style="background:var(--bg)"><div class="swatches">${th.c.map(c=>`<i style="background:${c}"></i>`).join("")}</div>
          <div class="fakeline" style="background:var(--accent);width:60%"></div><div class="fakeline" style="background:var(--border-strong);width:80%;height:5px"></div></div>
          <div class="tc-body"><div><b>${esc(th.name)}</b><div class="no">${th.no} ・ ${esc(th.desc)}</div></div>${active?'<span class="tc-check">✓ 使用中</span>':""}</div></button>`;
      }).join("");
      return `<div class="theme-group-label">${g}</div><div class="theme-gallery">${cards}</div>`;
    }).join("");
    return `<h2 class="section-title">デザインを選ぶ（全${THEMES.length}種）</h2>
      <p class="section-sub">アプリ全体の既定テーマを選べます。しおりごとの見た目は「編集」画面でも個別に設定できます。</p>
      <div class="panel" style="margin-bottom:20px"><div class="panel-head"><h3 style="font-size:16px">🍃 季節の演出</h3></div>
        <p class="section-sub" style="margin-bottom:8px">画面にそっと季節の粒（桜・雪・紅葉・きらめき）を降らせます。「自動」は今の季節に合わせます。</p>
        <div class="season-sel">${[["auto","🕒 自動"],["sakura","🌸 桜"],["leaves","🍁 紅葉"],["snow","❄ 雪"],["sparkle","✨ きらめき"],["off","🚫 オフ"]].map(([id,lb])=>`<button class="sc ${this.seasonMode()===id?"on":""}" onclick="App.setSeason('${id}')">${lb}</button>`).join("")}</div></div>
      ${sections}
      ${t?`<div class="panel" style="margin-top:26px"><div class="panel-head"><h3>開いているしおりのテーマ</h3></div>
        <p class="section-sub" style="margin-bottom:12px">「${esc(t.title||"無題")}」の見た目だけを変更します。</p>
        <select onchange="App.setTripTheme(this.value)">${THEMES.map(th=>`<option value="${th.id}" ${th.id===t.theme?"selected":""}>${th.no} ${th.name}</option>`).join("")}</select></div>`:""}`;
  },
  pickTheme(id){saveAppTheme(id);document.documentElement.setAttribute("data-theme",id);this.go("themes");toast(`テーマ「${themeById(id).name}」に変更しました`);},
  setTripTheme(id){const t=this.current();if(!t)return;t.theme=id;t.updatedAt=Date.now();this.save();toast("しおりのテーマを更新しました");},

  /* ---------- 共有 ---------- */
  encodeTrip(t){const c=Object.assign({},t);delete c.id;return btoa(unescape(encodeURIComponent(JSON.stringify(c)))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");},
  decodeTrip(str){let b=str.replace(/-/g,"+").replace(/_/g,"/");while(b.length%4)b+="=";return JSON.parse(decodeURIComponent(escape(atob(b))));},
  shareTrip(id){const t=this.trips.find(x=>x.id===id);if(!t)return;
    const url=location.origin+location.pathname+"#share="+this.encodeTrip(t);
    const body=`<p style="margin-bottom:14px">このしおりを共有します。リンクをコピーするか、ファイルに書き出せます。</p>
      <div class="field"><label>共有リンク（開くと相手のしおり一覧に追加されます）</label>
        <input class="share-link" id="share-url" value="${esc(url)}" readonly onclick="this.select()"></div>
      <p style="font-size:12.5px;color:var(--text-muted)">※ 行程・持ち物などのテキストは共有されます。<b>写真アルバムは各端末に保存されるため共有には含まれません。</b></p>`;
    this.modal("🔗 しおりを共有",body,[
      {label:"JSONで書き出す",ghost:true,fn:()=>this.exportJson(t)},
      {label:"リンクをコピー",fn:()=>{const el=document.getElementById("share-url");
        if(navigator.clipboard)navigator.clipboard.writeText(el.value).then(()=>toast("リンクをコピーしました"),()=>{el.select();document.execCommand("copy");toast("コピーしました");});
        else{el.select();document.execCommand("copy");toast("コピーしました");}}}]);},
  exportJson(t){const c=Object.assign({},t);delete c.id;const blob=new Blob([JSON.stringify(c,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`shiori_${(t.title||"trip").replace(/[\\/:*?"<>|\s]+/g,"_")}.json`;a.click();URL.revokeObjectURL(a.href);toast("JSONを書き出しました");},
  openImport(){const body=`<p style="margin-bottom:14px">共有されたしおりを追加します。リンクを貼り付けるか、JSONファイルを選んでください。</p>
      <div class="field"><label>共有リンク or 共有コード</label><textarea id="imp-text" placeholder="https://.../#share=... を貼り付け" style="min-height:70px"></textarea></div>
      <div class="field"><label>または JSONファイル</label><input type="file" id="imp-file" accept="application/json,.json"></div>`;
    this.modal("📥 しおりを読み込む",body,[{label:"キャンセル",ghost:true,fn:()=>this.closeModal()},{label:"読み込む",fn:()=>this.doImport()}]);},
  doImport(){const file=document.getElementById("imp-file").files[0];
    if(file){const r=new FileReader();r.onload=()=>{try{this.addImported(JSON.parse(r.result));}catch(e){toast("ファイルを読み込めませんでした");}};r.readAsText(file);return;}
    const txt=document.getElementById("imp-text").value.trim();if(!txt){toast("リンクかファイルを指定してください");return;}
    try{let code=txt;const m=txt.match(/#share=([^&\s]+)/);if(m)code=m[1];this.addImported(this.decodeTrip(code));}catch(e){toast("読み込みに失敗しました。内容をご確認ください");}},
  addImported(data){if(!data||(!data.title&&!data.days)){toast("しおりの形式ではありません");return;}
    data.id=uid();data.updatedAt=Date.now();data.createdAt=data.createdAt||Date.now();data.sample=false;
    data.theme=data.theme||"wa";data.cover=data.cover||"mountains";data.packing=data.packing||[];data.reservations=data.reservations||[];data.days=data.days||[blankDay()];
    data.country=data.country||"日本";data.pref=data.pref||detectPref(data.dest||"");
    this.trips.push(data);this.save();this.currentId=data.id;this.closeModal();location.hash="";toast("しおりを追加しました");this.go("view");},
  tryImportFromHash(){try{const data=this.decodeTrip(location.hash.replace("#share=",""));
    setTimeout(()=>{this.modal("📥 共有されたしおり",`<p>「<b>${esc(data.title||"無題")}</b>」を、あなたのしおり一覧に追加しますか？</p>`,
      [{label:"追加しない",ghost:true,fn:()=>{location.hash="";this.closeModal();}},{label:"追加する",fn:()=>this.addImported(data)}]);},300);
  }catch(e){location.hash="";}},

  /* ---------- モーダル ---------- */
  modal(title,bodyHtml,actions){
    const acts=actions.map((a,i)=>`<button class="btn ${a.ghost?"ghost":""}" id="ma-${i}" style="${a.danger?"background:#c0392b;color:#fff":""}">${esc(a.label)}</button>`).join("");
    document.getElementById("modal-root").innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)App.closeModal()">
      <div class="modal" role="dialog" aria-modal="true" aria-label="${esc(title)}">
      <div class="modal-head"><h3>${title}</h3><button class="close-x" onclick="App.closeModal()">✕</button></div>
      <div class="modal-body">${bodyHtml}</div><div class="modal-foot">${acts}</div></div></div>`;
    actions.forEach((a,i)=>document.getElementById("ma-"+i).onclick=a.fn);},
  closeModal(){document.getElementById("modal-root").innerHTML="";},
};

window.addEventListener("DOMContentLoaded",()=>App.init());
</script>
</body>
</html>
