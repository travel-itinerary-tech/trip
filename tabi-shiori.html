[data-theme="snow"]{--bg:#eef4f9;--bg2:#e0ebf4;--surface:#fff;--surface2:#f2f7fb;--border:#d3e2ee;--border-strong:#9fbdd6;--text:#243845;--text-muted:#6d8497;--accent:#4f7fa8;--accent2:#8aa7c0;--accent-contrast:#fff;--stamp-ink:#4f7fa8;--header-bg:linear-gradient(120deg,#93b8d8,#d3e5f2);--header-text:#22384a;--radius:18px;--font-display:"Zen Maru Gothic",sans-serif;--bg-pattern:radial-gradient(rgba(79,127,168,.08) 1px,transparent 1px);--bg-size:24px 24px;}
/* 15 星降る夜 */
[data-theme="starry"]{--bg:#0f1530;--bg2:#141c3e;--surface:#1a2447;--surface2:#212d59;--border:#2f3d78;--border-strong:#4a5aa8;--text:#e8ecff;--text-muted:#98a4d8;--accent:#f4c95d;--accent2:#7aa2ff;--accent-contrast:#12162e;--stamp-ink:#f4c95d;--header-bg:linear-gradient(160deg,#131a38,#241d4a);--header-text:#f2f0ff;--font-display:"Playfair Display",serif;--shadow:0 12px 34px rgba(0,0,0,.5);--bg-pattern:radial-gradient(rgba(244,201,93,.14) 1px,transparent 1.4px),radial-gradient(rgba(255,255,255,.10) 1px,transparent 1.2px);--bg-size:40px 40px,26px 26px;}
/* 16 北欧 */
[data-theme="nordic"]{--bg:#ecebe5;--bg2:#e1e0d8;--surface:#fbfbf7;--surface2:#f0efe9;--border:#dad8cd;--border-strong:#a9a89c;--text:#2b3138;--text-muted:#7c8489;--accent:#4a6b7a;--accent2:#c97b52;--accent-contrast:#fff;--stamp-ink:#c97b52;--header-bg:#37454d;--header-text:#f1f0ea;--radius:12px;--radius-sm:7px;--font-display:"Zen Kaku Gothic New",sans-serif;--shadow:0 6px 18px rgba(0,0,0,.07);}
/* 17 昭和レトロ */
[data-theme="showa"]{--bg:#efe2c2;--bg2:#e6d6ae;--surface:#f8efd4;--surface2:#eee0bc;--border:#d6c193;--border-strong:#a98f57;--text:#3a2e1c;--text-muted:#7d6a45;--accent:#c2622b;--accent2:#2e6b6b;--accent-contrast:#f8efd4;--stamp-ink:#b5451f;--header-bg:#b5451f;--header-text:#f6eccf;--radius:6px;--font-display:"Kaisei Decol",serif;}
/* 18 シックゴールド */
[data-theme="gold"]{--bg:#1a1815;--bg2:#211e19;--surface:#25211b;--surface2:#2e2921;--border:#3d382f;--border-strong:#5c5341;--text:#f0ead8;--text-muted:#b1a687;--accent:#c9a24b;--accent2:#9c8b6a;--accent-contrast:#1a1815;--stamp-ink:#c9a24b;--header-bg:linear-gradient(120deg,#211d17,#302a1f);--header-text:#f2e9d0;--font-display:"Playfair Display",serif;--shadow:0 12px 34px rgba(0,0,0,.45);}

/* ========================================================================== */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font-body);color:var(--text);background:var(--bg);background-image:var(--bg-pattern);background-size:var(--bg-size);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh}
h1,h2,h3{font-family:var(--font-display);line-height:1.25;margin:0}
button{font-family:inherit;cursor:pointer}
a{color:var(--accent)}
input,textarea,select{font-family:inherit;font-size:15px}
.hidden{display:none!important}
img{max-width:100%;display:block}

/* ヘッダー */
.app-header{background:var(--header-bg);color:var(--header-text);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:40;box-shadow:0 2px 14px rgba(0,0,0,.12)}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.brand .mark{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;font-size:20px;background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.35)}
.brand h1{font-size:20px;letter-spacing:.02em;color:inherit}
.brand .tag{font-size:11px;opacity:.8;letter-spacing:.14em;margin-top:1px}
.header-spacer{flex:1}
.header-btn{background:rgba(255,255,255,.14);color:inherit;border:1.5px solid rgba(255,255,255,.3);border-radius:999px;padding:8px 16px;font-size:14px;font-weight:700;transition:.15s}
.header-btn:hover{background:rgba(255,255,255,.26)}
.header-btn.primary{background:var(--accent-contrast);color:var(--accent);border-color:transparent}

/* タブ */
.tabbar{display:flex;gap:4px;padding:10px 16px 0;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:66px;z-index:30;overflow-x:auto}
.tab{border:none;background:transparent;color:var(--text-muted);padding:11px 15px;font-size:14px;font-weight:700;white-space:nowrap;border-radius:var(--radius-sm) var(--radius-sm) 0 0;position:relative;transition:.15s}
.tab[aria-selected="true"]{color:var(--accent);background:var(--surface)}
.tab[aria-selected="true"]::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:3px;background:var(--accent);border-radius:3px}
.tab:hover{color:var(--text)}

.wrap{max-width:940px;margin:0 auto;padding:26px 18px 90px}
.section-title{font-size:22px;margin-bottom:4px}
.section-sub{color:var(--text-muted);font-size:14px;margin-bottom:20px}

/* 一覧カード */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:16px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);transition:transform .16s,box-shadow .16s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.card-cover{height:118px;background:var(--header-bg);color:var(--header-text);padding:14px 16px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden}
.card-cover .cov-illust{position:absolute;right:-6px;top:-4px;width:130px;height:100px;opacity:.9;pointer-events:none}
.card-cover .theme-chip{position:absolute;top:10px;left:12px;font-size:10.5px;font-weight:700;background:rgba(255,255,255,.2);padding:3px 9px;border-radius:999px;letter-spacing:.05em}
.card-cover h3{font-size:17px;color:inherit;position:relative}
.card-cover .dest{font-size:12.5px;opacity:.92;margin-top:2px;position:relative}
.card-body{padding:13px 16px;flex:1;display:flex;flex-direction:column;gap:10px}
.card-meta{display:flex;gap:12px;font-size:12.5px;color:var(--text-muted);flex-wrap:wrap}
.progress{height:8px;border-radius:999px;background:var(--surface2);overflow:hidden;border:1px solid var(--border)}
.progress>i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .5s}
.progress-label{font-size:11.5px;color:var(--text-muted);display:flex;justify-content:space-between}
.card-actions{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border);background:var(--surface2);flex-wrap:wrap}
.mini{flex:1;min-width:52px;border:1.5px solid var(--border-strong);background:var(--surface);color:var(--text);padding:7px 4px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:700;transition:.14s}
.mini:hover{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent)}
.mini.danger:hover{background:#c0392b;border-color:#c0392b;color:#fff}
.sample-tag{position:absolute;bottom:12px;right:12px;font-size:10px;font-weight:800;letter-spacing:.08em;background:var(--accent2);color:#fff;padding:2px 8px;border-radius:999px}

/* 空状態 */
.empty{text-align:center;padding:48px 20px;color:var(--text-muted);border:2px dashed var(--border-strong);border-radius:var(--radius);background:var(--surface)}
.empty svg{width:160px;height:auto;margin:0 auto 12px}
.empty h3{font-size:19px;color:var(--text);margin-bottom:6px}

/* ボタン */
.btn{border:none;border-radius:var(--radius-sm);padding:11px 20px;font-size:15px;font-weight:700;transition:.15s;background:var(--accent);color:var(--accent-contrast)}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn.ghost{background:var(--surface);color:var(--accent);border:1.5px solid var(--border-strong)}
.btn.ghost:hover{background:var(--surface2);filter:none}
.btn.wide{width:100%}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}

/* フォーム */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--text)}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);transition:.15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent)}
.field textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.panel-head h3{font-size:17px}

/* 表紙イラスト選択 */
.illust-pick{display:flex;gap:8px;flex-wrap:wrap}
.illust-opt{width:74px;height:56px;border:2px solid var(--border);border-radius:10px;background:var(--surface2);display:grid;place-items:center;transition:.14s;padding:5px;color:var(--accent)}
.illust-opt svg{width:100%;height:100%}
.illust-opt[aria-pressed="true"]{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 25%,transparent)}
.illust-opt:hover{transform:translateY(-2px)}

/* 日程エディタ */
.day-block{border:1.5px dashed var(--border-strong);border-radius:var(--radius);padding:14px;margin-bottom:14px;background:var(--surface2)}
.day-head{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.day-head .daynum{width:34px;height:34px;flex:none;border-radius:10px;background:var(--accent);color:var(--accent-contrast);display:grid;place-items:center;font-weight:800;font-family:var(--font-display)}
.day-head input{flex:1;min-width:120px}
.spot-edit{display:grid;grid-template-columns:88px 1fr auto;gap:8px;align-items:start;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}
.spot-edit .col-main{display:flex;flex-direction:column;gap:6px}
.spot-edit .catrow{display:flex;gap:6px;flex-wrap:wrap}
.spot-edit select{flex:none;width:120px}
.icon-btn{border:1px solid var(--border);background:var(--surface);border-radius:8px;width:32px;height:32px;display:grid;place-items:center;font-size:14px;color:var(--text-muted);transition:.14s}
.icon-btn:hover{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent)}
.spot-ctrls{display:flex;flex-direction:column;gap:4px}
/* チェックリスト編集 */
.chk-edit{display:flex;gap:8px;margin-bottom:8px}
.chk-edit input{flex:1}

/* ==========================================================================
   閲覧モード
   ========================================================================== */
.booklet{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.booklet-cover{background:var(--header-bg);color:var(--header-text);padding:34px 28px;position:relative;overflow:hidden}
.booklet-cover .cov-illust{position:absolute;right:-14px;bottom:-10px;width:280px;height:190px;opacity:.92;pointer-events:none}
.booklet-cover .kicker{font-size:12px;letter-spacing:.24em;opacity:.85;margin-bottom:8px;position:relative}
.booklet-cover h2{font-size:30px;line-height:1.2;position:relative;max-width:70%}
.booklet-cover .dest{font-size:15px;opacity:.92;margin-top:8px;position:relative;max-width:70%}
.booklet-cover .dates{display:inline-flex;gap:8px;align-items:center;margin-top:14px;font-size:13.5px;background:rgba(255,255,255,.16);padding:6px 14px;border-radius:999px;position:relative}
.booklet-cover .members{margin-top:10px;font-size:12.5px;opacity:.9;position:relative}
.booklet-body{padding:24px 24px 30px}

.info-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.info-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.info-box .lbl{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.08em;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.info-box .val{font-size:13.5px;white-space:pre-wrap;word-break:break-word}

.subsection-title{font-family:var(--font-display);font-size:18px;margin:24px 0 12px;display:flex;align-items:center;gap:9px}
.subsection-title::before{content:"";width:5px;height:20px;background:var(--accent);border-radius:3px}

.day-view{margin-bottom:26px}
.day-view-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.day-view-head .info{min-width:0}
.day-view-head .num{font-family:var(--font-display);font-size:26px;color:var(--accent);font-weight:800;line-height:1}
.day-view-head .info b{font-size:16px;display:block}
.day-view-head .info span{font-size:12.5px;color:var(--text-muted)}
.timeline{position:relative;padding-left:26px}
.timeline::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--border-strong)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item::before{content:"";position:absolute;left:-24px;top:5px;width:13px;height:13px;border-radius:50%;background:var(--surface);border:3px solid var(--accent)}
.tl-item.done::before{background:var(--accent)}
.tl-time{font-size:12.5px;font-weight:800;color:var(--accent);letter-spacing:.03em}
.tl-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;margin-top:4px;display:flex;gap:10px;align-items:flex-start}
.tl-emoji{font-size:22px;flex:none;line-height:1.2}
.tl-main{flex:1;min-width:0}
.tl-name{font-weight:700;font-size:15.5px}
.tl-cat{font-size:11px;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);padding:1px 8px;border-radius:999px;margin-left:6px;font-weight:700}
.tl-addr{font-size:12.5px;color:var(--text-muted);margin-top:2px}
.tl-memo{font-size:13px;margin-top:5px;white-space:pre-wrap}
.tl-visit{border:1.5px solid var(--border-strong);background:var(--surface);color:var(--text);font-size:11.5px;font-weight:700;border-radius:999px;padding:5px 12px;white-space:nowrap;flex:none;transition:.15s}
.tl-visit:hover{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent)}
.tl-visit.done{background:var(--stamp-ink);color:#fff;border-color:var(--stamp-ink)}

/* チェックリスト表示 */
.check-list{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.check-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;cursor:pointer;transition:.14s;font-size:14px}
.check-item:hover{border-color:var(--accent)}
.check-item .box{width:20px;height:20px;border:2px solid var(--border-strong);border-radius:6px;flex:none;display:grid;place-items:center;font-size:13px;color:#fff;transition:.14s}
.check-item.on .box{background:var(--accent);border-color:var(--accent)}
.check-item.on span{text-decoration:line-through;color:var(--text-muted)}

/* ==========================================================================
   スタンプラリー
   ========================================================================== */
.rally-hero{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:20px;box-shadow:var(--shadow-sm);text-align:center}
.rally-hero h2{font-size:22px;margin-bottom:4px}
.rally-hero .sub{color:var(--text-muted);font-size:13.5px}
.rally-ring{--p:0;width:132px;height:132px;margin:16px auto 8px;border-radius:50%;position:relative;background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--surface2) 0)}
.rally-ring::after{content:"";position:absolute;inset:12px;border-radius:50%;background:var(--surface);border:1px solid var(--border)}
.rally-ring .num{position:absolute;inset:0;display:grid;place-items:center;z-index:1;text-align:center}
.rally-ring .num b{font-family:var(--font-display);font-size:30px;color:var(--accent);display:block;line-height:1}
.rally-ring .num small{font-size:11px;color:var(--text-muted)}
.rally-badge{display:inline-block;margin-top:6px;font-weight:800;font-size:13px;color:var(--accent2)}
.stamp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:16px}
.stamp{aspect-ratio:1;border-radius:16px;border:2px dashed var(--border-strong);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px;text-align:center;position:relative;transition:transform .15s;cursor:pointer}
.stamp:hover{transform:scale(1.03)}
.stamp .s-emoji{font-size:32px;filter:grayscale(1);opacity:.4;transition:.2s}
.stamp .s-name{font-size:12px;font-weight:700;color:var(--text-muted);line-height:1.25}
.stamp .s-day{position:absolute;top:7px;left:9px;font-size:10px;font-weight:800;color:var(--text-muted);opacity:.7}
.stamp .s-hint{font-size:10px;color:var(--text-muted);opacity:.7}
.stamp.stamped{border:2px solid var(--stamp-ink);border-style:solid;background:var(--surface2)}
.stamp.stamped .s-emoji{filter:none;opacity:1}
.stamp.stamped .s-name{color:var(--text)}
.stamp.stamped::before{content:"押印";position:absolute;inset:0;margin:auto;width:76px;height:76px;border-radius:50%;border:3px double var(--stamp-ink);color:var(--stamp-ink);display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:15px;letter-spacing:.1em;transform:rotate(-14deg);opacity:.16;pointer-events:none}
.stamp.stamped .s-date{font-size:9.5px;color:var(--stamp-ink);font-weight:800;margin-top:1px}
@keyframes press{0%{transform:scale(2.4) rotate(-30deg);opacity:0}55%{transform:scale(.82) rotate(-10deg);opacity:1}100%{transform:scale(1) rotate(-14deg);opacity:.16}}
.stamp.just-stamped::before{animation:press .5s cubic-bezier(.2,1.4,.4,1) both}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
.confetti i{position:absolute;top:-14px;width:9px;height:14px;opacity:.95;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.9}}

/* ==========================================================================
   アルバム
   ========================================================================== */
.album-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.photo-grid{columns:3 200px;column-gap:14px}
.photo-cell{break-inside:avoid;margin-bottom:14px;border-radius:var(--radius);overflow:hidden;background:var(--surface);border:1.5px solid var(--border);box-shadow:var(--shadow-sm);position:relative}
.photo-cell img{width:100%;cursor:zoom-in;transition:.2s}
.photo-cell:hover img{filter:brightness(1.03)}
.photo-cap{padding:8px 11px;font-size:12.5px;color:var(--text)}
.photo-cap .pday{color:var(--accent);font-weight:800;font-size:11px}
.photo-del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;width:28px;height:28px;border-radius:8px;font-size:14px;opacity:0;transition:.15s}
.photo-cell:hover .photo-del{opacity:1}
.upload-drop{border:2px dashed var(--border-strong);border-radius:var(--radius);padding:30px;text-align:center;color:var(--text-muted);background:var(--surface);cursor:pointer;transition:.15s}
.upload-drop:hover{border-color:var(--accent);color:var(--accent)}
.lightbox{position:fixed;inset:0;background:rgba(10,8,6,.9);z-index:100;display:grid;place-items:center;padding:24px;animation:fadein .18s}
.lightbox img{max-width:92vw;max-height:80vh;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.lightbox .lb-cap{position:absolute;bottom:24px;left:0;right:0;text-align:center;color:#fff;font-size:14px;padding:0 20px}
.lightbox .lb-x{position:absolute;top:20px;right:22px;background:rgba(255,255,255,.15);color:#fff;border:none;width:42px;height:42px;border-radius:50%;font-size:20px}
.lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:none;width:48px;height:48px;border-radius:50%;font-size:22px}
.lightbox .lb-prev{left:16px}.lightbox .lb-next{right:16px}

/* テーマギャラリー */
.theme-group-label{font-family:var(--font-display);font-size:15px;color:var(--text-muted);margin:22px 0 10px;letter-spacing:.06em}
.theme-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.theme-card{border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface);cursor:pointer;transition:.16s;text-align:left;padding:0}
.theme-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.theme-card[aria-pressed="true"]{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 25%,transparent)}
.tc-preview{height:74px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 11px;position:relative}
.tc-preview .swatches{position:absolute;top:9px;right:10px;display:flex;gap:4px}
.tc-preview .swatches i{width:13px;height:13px;border-radius:4px;border:1px solid rgba(0,0,0,.15)}
.tc-preview .fakeline{height:6px;border-radius:3px;margin-bottom:4px}
.tc-body{padding:9px 11px;display:flex;align-items:center;justify-content:space-between;gap:6px;border-top:1px solid var(--border)}
.tc-body b{font-size:13.5px}
.tc-body .no{font-size:11px;color:var(--text-muted);font-weight:700}
.tc-check{font-size:12px;font-weight:800;color:var(--accent);white-space:nowrap}

/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(20,16,10,.5);backdrop-filter:blur(3px);z-index:80;display:grid;place-items:center;padding:20px;animation:fadein .18s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);color:var(--text);border-radius:var(--radius);max-width:520px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.35);border:1.5px solid var(--border);max-height:88vh;overflow:auto;animation:pop .22s}
@keyframes pop{from{transform:translateY(14px) scale(.97);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:18px}
.modal-body{padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.close-x{border:none;background:var(--surface2);width:32px;height:32px;border-radius:8px;font-size:17px;color:var(--text-muted)}
.share-link{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-size:12.5px;word-break:break-all;color:var(--text-muted);font-family:monospace}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--text);color:var(--bg);padding:12px 22px;border-radius:999px;font-weight:700;font-size:14px;z-index:110;transition:.28s;box-shadow:0 8px 24px rgba(0,0,0,.25);pointer-events:none;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.fab{position:fixed;right:22px;bottom:22px;z-index:35;border:none;border-radius:999px;background:var(--accent);color:var(--accent-contrast);padding:15px 22px;font-weight:800;font-size:15px;box-shadow:0 10px 26px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;transition:.15s}
.fab:hover{transform:translateY(-2px)}
.back-link{background:none;border:none;color:var(--accent);font-weight:700;font-size:14px;padding:0;margin-bottom:14px;display:inline-flex;gap:5px;align-items:center}

/* 制覇マップ */
.map-toggle{display:inline-flex;gap:4px;margin-top:14px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:4px}
.mt-btn{border:none;background:transparent;color:var(--text-muted);font-weight:800;font-size:13px;padding:7px 16px;border-radius:999px;transition:.15s}
.mt-btn.on{background:var(--accent);color:var(--accent-contrast)}
.worldmap{max-width:640px}
/* 実SVG地図（都道府県・市区町村・世界）塗りつぶし方式 */
.geomap{width:100%;height:auto;display:block;margin:0 auto}
.jpsvg,.munisvg{max-width:460px}
.worldsvg{max-width:100%}
.geomap .gp{fill:var(--surface2);stroke:var(--border-strong);stroke-width:.9;vector-effect:non-scaling-stroke;transition:fill .18s;cursor:pointer}
.geomap .gp:hover{fill:color-mix(in srgb,var(--accent) 30%,var(--surface2))}
.geomap .gp.on{fill:var(--accent);stroke:color-mix(in srgb,#000 20%,var(--accent))}
.geomap .gp.sel{stroke:var(--accent2);stroke-width:2.2}
.munisvg .gp{stroke-width:.7}
.worldsvg .gp{cursor:default}
.worldsvg .gp.on{cursor:pointer}
.muni-panel .map-wrap{background:transparent;border:none;box-shadow:none;padding:4px}
.map-hint{font-size:12px;color:var(--text-muted);text-align:center;margin:8px 0 0}
.map-credit{font-size:10.5px;color:var(--text-muted);opacity:.75;text-align:center;margin-top:22px}
.geo-stats{display:flex;justify-content:center;gap:14px;margin:16px 0 4px;flex-wrap:wrap}
.geo-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 20px;min-width:88px}
.geo-stat b{font-family:var(--font-display);font-size:26px;color:var(--accent);display:block;line-height:1}
.geo-stat b span{font-size:15px;color:var(--text-muted)}
.geo-stat small{font-size:11.5px;color:var(--text-muted)}
.map-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow-sm);overflow-x:auto;margin-bottom:6px}
.jpmap{width:100%;max-width:520px;height:auto;display:block;margin:0 auto}
.jpmap .mtile{cursor:pointer}
.jpmap .mtile rect{fill:var(--surface2);stroke:var(--border-strong);stroke-width:1.5;stroke-dasharray:3 3;transition:.18s}
.jpmap .mtile text{fill:var(--text-muted);font-size:11px;font-weight:700;font-family:var(--font-body);pointer-events:none}
.jpmap .mtile:hover rect{stroke:var(--accent);stroke-dasharray:none}
.jpmap .mtile.on rect{fill:var(--accent);stroke:var(--accent);stroke-dasharray:none}
.jpmap .mtile.on text{fill:var(--accent-contrast)}
.jpmap .mtile.on .mchk{font-size:10px;opacity:.85}
.jpmap .mtile.sel rect{stroke:var(--accent2);stroke-width:3;stroke-dasharray:none}
.reg-list{display:flex;flex-direction:column;gap:9px}
.reg-row{display:flex;align-items:center;gap:12px}
.reg-name{font-size:13px;font-weight:700;width:88px;flex:none}
.reg-num{font-size:12.5px;color:var(--text-muted);width:42px;text-align:right;flex:none}
.geo-chips{display:flex;flex-wrap:wrap;gap:8px}
.geo-chip{display:inline-block;font-size:13px;font-weight:700;background:var(--surface2);border:1.5px solid var(--border);color:var(--text-muted);border-radius:999px;padding:5px 13px;margin:0 2px 4px 0}
.geo-chip.on{background:color-mix(in srgb,var(--accent) 14%,var(--surface));border-color:var(--accent);color:var(--accent)}
.geo-chip.sm{font-size:11.5px;padding:3px 10px}
.city-block{margin-bottom:10px;font-size:13.5px}
.city-block b{color:var(--accent);margin-right:6px}
.recent-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.recent-item{display:flex;gap:10px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px}
.recent-item .rc-emoji{font-size:20px}
.recent-item b{font-size:13.5px;display:block}
.recent-item small{font-size:11.5px;color:var(--text-muted)}

/* モード選択・おすすめ提案 */
.create-choices{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:6px}
.choice-card{border:2px solid var(--border);border-radius:var(--radius);background:var(--surface);padding:26px 22px;text-align:center;cursor:pointer;transition:.16s;box-shadow:var(--shadow-sm)}
.choice-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow)}
.choice-card .ci{width:120px;height:88px;margin:0 auto 12px;color:var(--accent)}
.choice-card h3{font-size:20px;margin-bottom:8px}
.choice-card p{font-size:13.5px;color:var(--text-muted);margin:0;line-height:1.7}
.choice-card .go{margin-top:16px;display:inline-block;background:var(--accent);color:var(--accent-contrast);padding:9px 22px;border-radius:999px;font-weight:800;font-size:14px}
.interest-grid{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1.5px solid var(--border-strong);background:var(--surface);color:var(--text);border-radius:999px;padding:8px 15px;font-size:13.5px;font-weight:700;transition:.14s}
.chip[aria-pressed="true"]{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent)}
.plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.plan-card{border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);overflow:hidden;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;transition:transform .16s,box-shadow .16s}
.plan-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.plan-head{padding:16px 18px;position:relative;overflow:hidden}
.plan-head .cov-illust{position:absolute;right:-10px;top:-6px;width:110px;height:84px;opacity:.85;pointer-events:none}
.plan-badge{position:absolute;top:12px;right:12px;font-size:11px;font-weight:800;background:rgba(255,255,255,.22);padding:3px 10px;border-radius:999px;letter-spacing:.06em}
.plan-head h3{font-size:18px;position:relative}
.plan-head .pl-desc{font-size:12px;opacity:.92;margin-top:4px;position:relative;max-width:82%}
.plan-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:10px}
.pl-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text-muted)}
.pl-days{display:flex;flex-direction:column;gap:6px}
.pl-day{font-size:12.5px;line-height:1.5;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px}
.pl-day b{color:var(--accent);margin-right:6px}
.pl-budget{font-size:12px;color:var(--text-muted)}
.plan-foot{padding:12px 16px;border-top:1px solid var(--border);background:var(--surface2)}
/* 予約チェックリスト */
.reso-item{display:flex;gap:12px;align-items:flex-start;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px}
.reso-item.done{opacity:.6}
.reso-item.done .reso-label{text-decoration:line-through}
.reso-check{flex:none;width:24px;height:24px;border-radius:7px;border:2px solid var(--border-strong);background:var(--surface);color:#fff;font-size:14px;display:grid;place-items:center;font-weight:800;cursor:pointer}
.reso-item.done .reso-check{background:var(--accent);border-color:var(--accent)}
.reso-main{flex:1;min-width:0}
.reso-label{font-weight:800;font-size:14.5px}
.reso-opt{font-size:10px;font-weight:800;color:var(--text-muted);border:1px solid var(--border-strong);border-radius:999px;padding:0 6px;margin-left:4px}
.reso-why{font-size:12.5px;color:var(--text-muted);margin-top:3px;white-space:pre-wrap}
.reso-links{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.reso-link{font-size:12.5px;font-weight:700;text-decoration:none;background:var(--surface);border:1.5px solid var(--accent);color:var(--accent);border-radius:8px;padding:5px 11px;transition:.14s}
.reso-link:hover{background:var(--accent);color:var(--accent-contrast)}
.reso-edit{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center}
@media (max-width:560px){.create-choices{grid-template-columns:1fr}
  .reso-edit{grid-template-columns:auto 1fr auto;grid-template-areas:"grip label del" "url url url";column-gap:8px;row-gap:6px}
  .reso-edit .drag-grip{grid-area:grip}
  .reso-edit input:nth-of-type(1){grid-area:label;min-width:0}
  .reso-edit input:nth-of-type(2){grid-area:url;min-width:0}
  .reso-edit .icon-btn{grid-area:del}
}

@media (max-width:560px){
  .brand .tag{display:none}
  .row2{grid-template-columns:1fr}
  .spot-edit{grid-template-columns:70px 1fr auto}
  .spot-edit select{width:100%}
  .booklet-cover h2,.booklet-cover .dest{max-width:100%}
  .booklet-cover .cov-illust{opacity:.4}
  .fab span{display:none}
}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
/* =========================================================================
   Redesign layer — オリジナルの「トラベルチケット/ジャーナル」意匠
   （標準UIパターン＋自作アセットのみ。特定アプリの模倣なし）
   ========================================================================= */
:root{--seam:2px dashed color-mix(in srgb,var(--border-strong) 55%,transparent)}
body{font-feature-settings:"palt" 1}
/* ヘッダー */
.app-header{box-shadow:none;border-bottom:1px solid rgba(255,255,255,.12)}
.brand .mark{background:transparent;border:none;width:40px;height:40px;padding:0}
.brand .mark svg{width:40px;height:40px;display:block}
.brand h1{font-weight:800;letter-spacing:.06em;font-size:19px}
.brand .tag{letter-spacing:.32em;font-size:9px;opacity:.7;text-transform:uppercase;margin-top:3px}
/* タブ：アイコン＋ラベル、下線インジケータ、面塗りなし */
.tabbar{gap:2px;padding:0 10px;background:var(--bg);box-shadow:inset 0 -1px 0 var(--border)}
.tab{display:flex;align-items:center;gap:7px;padding:13px 13px;border-radius:0;font-size:13.5px;font-weight:700;letter-spacing:.02em}
.tab .tab-ico{width:18px;height:18px;flex:none}
.tab[aria-selected="true"]{background:transparent;color:var(--accent)}
.tab[aria-selected="true"]::after{left:13px;right:13px;bottom:0;height:2.5px;border-radius:2px}
/* 見出し：ラベル＋破線ルートの意匠 */
.section-title{letter-spacing:.01em}
.subsection-title{display:flex;align-items:center;gap:10px}
.subsection-title::after{content:"";flex:1;height:0;border-top:2px dotted var(--border-strong);opacity:.5}
/* ボタン：フラットで意図的に */
.btn{border-radius:11px;font-weight:800;letter-spacing:.02em;box-shadow:none}
.btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
.btn.ghost{background:transparent}
.header-btn{border-radius:10px}
.header-btn.primary{font-weight:800;letter-spacing:.02em}
/* 一覧カード：切符スタブ（cover と body の間に目打ち＝破線） */
.card{border-radius:14px}
.card-body{border-top:var(--seam)}
.card-cover .theme-chip,.card-cover .sample-tag{border-radius:6px;letter-spacing:.08em;font-weight:800}
.card-cover h3{letter-spacing:.01em}
.progress{height:7px}
.mini{border-radius:9px;font-weight:800}
/* しおり表紙：搭乗券ふう。目打ちで本文と分離 */
.booklet{border-radius:16px}
.booklet-cover .kicker{letter-spacing:.42em;font-size:10px;opacity:.7}
.booklet-cover h2{letter-spacing:.01em}
.booklet-cover .dates{border-radius:8px;font-weight:700}
.booklet-body{border-top:var(--seam)}
.info-box{border-radius:10px}
.info-box .lbl{letter-spacing:.1em;text-transform:none}
/* 制覇マップ：数値を主役に */
.geo-stat{border-radius:12px}
.map-wrap{border-radius:16px}
/* プラン提案カード */
.plan-card{border-radius:16px}
.plan-body{border-top:var(--seam)}
.plan-badge{border-radius:6px;letter-spacing:.1em}
/* パネル・チップ・入力の面取りを統一 */
.panel{border-radius:16px}
.chip{border-radius:10px;font-weight:700}
.field input,.field textarea,.field select{border-radius:10px}
.illust-opt{border-radius:10px}
/* FAB：主行動を一つだけ、控えめな影 */
.fab{border-radius:14px;box-shadow:0 8px 22px rgba(0,0,0,.18);font-weight:800;letter-spacing:.02em}
/* モーダル/トースト */
.modal{border-radius:16px}
.toast{border-radius:12px;font-weight:800;letter-spacing:.02em}
/* 選択カード（作り方） */
.choice-card{border-radius:16px}
.choice-card .go{border-radius:11px;letter-spacing:.02em}
/* 予約リンク */
.reso-link{border-radius:9px}
.reso-item{border-radius:11px}
/* 区間の移動時間・地図リンク */
.tl-leg{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 0 14px 2px;padding-left:2px;font-size:11.5px;color:var(--text-muted)}
.tl-leg::before{content:"";width:2px;height:16px;background:repeating-linear-gradient(var(--border-strong) 0 3px,transparent 3px 6px);margin-left:-2px}
.tl-leg a{color:var(--accent);font-weight:700;text-decoration:none;border-bottom:1px dashed var(--accent)}
/* 日別の地図経路ボタン */
.day-view-head .day-maps{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.mini-map{font-size:11.5px;font-weight:800;text-decoration:none;padding:6px 11px;border-radius:9px;border:1.5px solid var(--border-strong);color:var(--text);background:var(--surface);white-space:nowrap}
.mini-map.g{border-color:var(--accent);color:var(--accent)}
.mini-map:hover{filter:brightness(1.05)}
/* 時間組み直しボタン */
.mini.recompute{margin-left:8px;font-size:11.5px;font-weight:800;background:var(--accent);color:var(--accent-contrast);border:none;padding:6px 12px;border-radius:9px;vertical-align:middle}
/* 住所ヒント */
.addr-hint{font-size:11px;color:var(--text-muted);margin:2px 0 2px;line-height:1.5}
.addr-hint b{color:var(--accent)}
.addr-hint .ah-ok{color:var(--accent2);font-weight:800;margin-left:4px}
/* 区間の移動手段セレクト（しおり表示） */
.tl-leg .leg-mode-sel{font-size:11px;font-weight:800;border:1.5px solid var(--border-strong);background:var(--surface);color:var(--text);border-radius:8px;padding:3px 6px}
/* 編集：次への移動（手段＋分の手動修正） */
.leg-edit{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:-4px 0 12px 2px;padding:7px 10px;background:color-mix(in srgb,var(--accent) 7%,var(--surface));border:1px dashed var(--border-strong);border-radius:10px;font-size:12px}
.leg-edit .leg-lbl{font-weight:800;color:var(--accent)}
.leg-edit select,.leg-edit input{font-size:12px;padding:5px 8px;border:1.5px solid var(--border-strong);border-radius:8px;background:var(--surface);color:var(--text)}
/* 効率化バー */
.opt-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:2px 0 14px}
.opt-bar .opt-hint{font-size:11.5px;color:var(--text-muted);flex:1;min-width:180px}
/* お気に入り（★） */
.fav-btn{position:absolute;top:8px;right:10px;z-index:2;background:rgba(0,0,0,.22);color:#ffd75e;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;line-height:1;cursor:pointer;transition:.15s;backdrop-filter:blur(2px)}
.fav-btn:hover{transform:scale(1.12)}
.fav-btn.on{color:#ffcf3f;text-shadow:0 0 10px rgba(255,207,63,.6)}
.card-cover .fav-btn{top:8px;right:10px}
.cover-fav{top:14px;right:14px;width:38px;height:38px;font-size:21px}
.tl-btns{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex:none}
.tl-fav{border:1.5px solid var(--border-strong);background:var(--surface);color:var(--text-muted);font-size:14px;line-height:1;border-radius:999px;width:30px;height:30px;cursor:pointer;transition:.15s}
.tl-fav:hover{border-color:#ffcf3f;color:#ffcf3f}
.tl-fav.on{color:#ffcf3f;border-color:#ffcf3f;background:color-mix(in srgb,#ffcf3f 14%,var(--surface))}
.tl-item.fav .tl-card{box-shadow:inset 3px 0 0 #ffcf3f}
.fav-strip{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:2px 0 16px;padding:10px 12px;background:color-mix(in srgb,#ffcf3f 12%,var(--surface));border:1px solid color-mix(in srgb,#ffcf3f 40%,var(--border));border-radius:12px}
.fav-strip-lbl{font-weight:800;font-size:12.5px;color:var(--accent)}
.fav-chip{font-size:12px;font-weight:700;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:4px 11px}
.btn.on-fav{background:var(--accent);color:var(--accent-contrast)}
/* 並び順セレクト */
.sort-sel{font-size:12px;color:var(--text-muted);font-weight:700;display:inline-flex;align-items:center;gap:6px;margin-left:8px}
.sort-sel select{font-size:12.5px;font-weight:700;padding:6px 10px;border:1.5px solid var(--border-strong);border-radius:9px;background:var(--surface);color:var(--text)}
/* 地図の★マーカー */
.favmark{fill:#ffcf3f;stroke:#7a5200;stroke-width:1;paint-order:stroke;pointer-events:none;filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
.geo-chip.fav{background:color-mix(in srgb,#ffcf3f 16%,var(--surface));border-color:#ffcf3f;color:var(--text)}
.fav-map-list{display:flex;flex-direction:column;gap:8px}
/* お気に入り一覧画面 */
.fav-trip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:8px}
.fav-trip{position:relative;text-align:left;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;background:var(--header-bg);color:var(--header-text);padding:14px 14px 12px;cursor:pointer;min-height:92px;transition:transform .15s,box-shadow .15s}
.fav-trip:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.fav-trip .ft-illust{position:absolute;right:-8px;top:-6px;width:88px;height:70px;opacity:.85;pointer-events:none}
.fav-trip .ft-star{position:absolute;top:9px;right:11px;color:#ffcf3f;font-size:17px;z-index:1}
.fav-trip b{position:relative;z-index:1;font-size:14.5px;display:block;line-height:1.35}
.fav-trip small{position:relative;z-index:1;font-size:11.5px;opacity:.9}
.fav-list{display:flex;flex-direction:column;gap:10px}
.fav-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 14px}
.fav-row .fav-emoji{font-size:22px;flex:none}
.fav-info{flex:1;min-width:0}
.fav-info b{font-size:14.5px}
.fav-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.fav-sub a{color:var(--accent);font-weight:700;cursor:pointer;text-decoration:none;border-bottom:1px dashed var(--accent)}
.fav-addr{font-size:11.5px;color:var(--text-muted);margin-top:3px}
.fav-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex:none}
/* ドラッグ並び替え */
.drag-grip{cursor:grab;user-select:none;color:var(--text-muted);font-size:15px;line-height:1;padding:2px 4px;border-radius:6px;touch-action:none}
.drag-grip:hover{background:var(--surface2);color:var(--accent)}
.drag-grip:active{cursor:grabbing}
.day-drag{font-size:16px}
.spot-edit.drag-over{outline:2px dashed var(--accent);outline-offset:2px;background:color-mix(in srgb,var(--accent) 8%,var(--surface))}
.day-block.drag-over-day{outline:2px dashed var(--accent2);outline-offset:3px}
.card.draggable{position:relative}
.card.draggable .card-drag{position:absolute;top:8px;left:10px;z-index:3;background:rgba(0,0,0,.28);color:#fff;border-radius:7px}
.card.drag-over-card{outline:3px dashed var(--accent);outline-offset:2px}
.sort-hint{font-size:11.5px;color:var(--text-muted);margin:-8px 0 14px}
/* タッチ長押しドラッグ */
body.pd-active{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.drag-grip.grabbing{color:var(--accent);background:var(--surface2)}
.pd-ghost{position:fixed;z-index:9999;pointer-events:none;opacity:.92;transform:rotate(1.5deg) scale(1.02);box-shadow:0 12px 30px rgba(0,0,0,.28);border-radius:12px;overflow:hidden}
.pd-target{outline:2.5px dashed var(--accent)!important;outline-offset:2px;background:color-mix(in srgb,var(--accent) 9%,var(--surface))}
.card.pd-target{outline:3px dashed var(--accent)!important}
.chk-edit.drag-over,.reso-edit.drag-over{outline:2px dashed var(--accent);outline-offset:2px;background:color-mix(in srgb,var(--accent) 8%,var(--surface))}
.chk-edit,.reso-edit{align-items:center}
/* 印刷：改ページ最適化・操作系を非表示 */
@media print{
  .day-view,.tl-item,.reso-item,.check-item,.info-box,.fav-strip,.recent-item{break-inside:avoid;page-break-inside:avoid}
  .booklet-cover,.subsection-title{break-after:avoid;page-break-after:avoid}
  .tl-btns,.tl-visit,.tl-fav,.day-maps,.recompute,.leg-mode-sel,.tl-leg a,.fav-btn,.cover-fav{display:none!important}
  .tl-leg{color:#555!important}
  a[href]::after{content:""!important}
}
/* 記念演出：絵文字パーティクル */
.confetti .cfx{width:auto;height:auto;font-size:26px;animation:fall linear forwards}
/* 実績バッジ */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.ach{display:flex;gap:10px;align-items:center;padding:11px 12px;border:1px solid var(--border);border-radius:12px;background:var(--surface);opacity:.55;filter:grayscale(.4)}
.ach.on{opacity:1;filter:none;border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--surface))}
.ach-ico{font-size:26px;flex:none}
.ach-b{min-width:0}
.ach-b b{font-size:13px;display:block;line-height:1.3}
.ach-ok{font-size:11px;font-weight:800;color:var(--accent2)}
.progress.sm{height:6px;margin-top:5px}
.ach-b small{font-size:10.5px;color:var(--text-muted)}
/* 記念の記録 */
.ms-list{display:flex;flex-direction:column;gap:8px}
.ms-item{display:flex;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px}
.ms-item span{font-size:20px}
.ms-item b{font-size:13.5px;display:block}
.ms-item small{font-size:11px;color:var(--text-muted)}
/* ルーレット */
.roulette-cta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:18px;padding:14px;border:1px dashed var(--border-strong);border-radius:14px;background:var(--surface2)}
.roulette-cta span{font-size:12px;color:var(--text-muted);flex:1;min-width:160px}
.roulette{text-align:center;padding:8px 0}
.rl-window{border:3px solid var(--accent);border-radius:16px;padding:26px 10px;background:var(--surface2);overflow:hidden}
.rl-name{font-size:34px;font-weight:800;color:var(--text);font-family:var(--font-display)}
.rl-name.rl-final{color:var(--accent);transform:scale(1.12);transition:.2s}
.rl-hint{margin-top:12px;font-size:14px;color:var(--text-muted)}
/* 共有画像モーダル */
.share-img-wrap{text-align:center;max-height:60vh;overflow:auto;border-radius:12px}
.share-img{max-width:100%;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.18)}
/* QR */
.qr-wrap{display:flex;justify-content:center;padding:8px}
.qr-wrap svg{width:min(280px,72vw);height:auto;image-rendering:pixelated;background:#fff;border-radius:10px;padding:8px;box-shadow:0 4px 16px rgba(0,0,0,.14)}
/* ===== 折り返し・はみ出し対策（PC/モバイル共通） ===== */
.tl-name,.tl-addr,.tl-memo,.card-cover h3,.card-cover .dest,.booklet-cover h2,
.fav-info b,.fav-sub,.fav-addr,.ms-item b,.ach-b b,.rl-name,.section-title,
.plan-title,.recent-item b,.geo-chip,.reso-view-label,.info-box .val{overflow-wrap:anywhere;word-break:normal}
.tl-name{min-width:0}
.tl-main,.fav-info,.ms-item div,.recent-item div{min-width:0}
.rl-name{line-height:1.25;max-width:100%;padding:0 6px}
.leg-lbl{white-space:nowrap}
@media (max-width:560px){
  .choice-card p br{display:none}          /* 強制改行はモバイルでは無効化して自然に折り返す */
  .rl-name{font-size:26px}
  .booklet-cover .dest{max-width:100%}
  .sort-sel{margin-left:0}
}
/* 検索 */
.home-search{position:relative;margin:0 0 18px}
.home-search input{width:100%;padding:11px 38px 11px 14px;border:1.5px solid var(--border-strong);border-radius:12px;background:var(--surface);color:var(--text);font-size:14px}
.home-search .hq-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:var(--surface2);color:var(--text-muted);width:26px;height:26px;border-radius:50%;cursor:pointer}
/* 印刷 / PDF */
@media print{
  .app-header,.tabbar,.fab,#bg-decor,.back-link,.btn-row,.map-hint,.no-print,.card-actions,.home-hero{display:none!important}
  body{background:#fff!important}
  main,#main{padding:0!important;max-width:none!important}
  .booklet{box-shadow:none!important;border:none!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
/* 背景イラスト層（可読性を損なわない薄さ） */
#bg-decor{position:fixed;inset:0;z-index:-1;color:var(--accent);opacity:.055;pointer-events:none}
[data-theme="neon"] #bg-decor,[data-theme="starry"] #bg-decor,[data-theme="gold"] #bg-decor{opacity:.08}
/* ヘッダーの雲・ルート装飾 */
.app-header{overflow:hidden}
.header-decor{position:absolute;inset:0;z-index:0;color:var(--header-text);opacity:.15;pointer-events:none}
.app-header .brand,.app-header .header-spacer,.app-header .header-btn{position:relative;z-index:1}
/* ホームのヒーローバナー */
.home-hero{position:relative;overflow:hidden;border-radius:20px;background:var(--header-bg);color:var(--header-text);padding:26px 24px;margin-bottom:22px;min-height:132px;display:flex;align-items:center;box-shadow:var(--shadow-sm)}
.home-hero .hh-decor{position:absolute;inset:0;z-index:0}
.home-hero .hh-decor svg{width:100%;height:100%;display:block}
.home-hero .hh-text{position:relative;z-index:1;max-width:74%}
.home-hero .hh-kicker{font-size:10px;letter-spacing:.34em;opacity:.75;font-weight:800}
.home-hero h2{font-size:26px;margin:6px 0 4px;letter-spacing:.02em}
.home-hero p{font-size:13.5px;opacity:.94;margin:0 0 14px;line-height:1.6}
.home-hero .btn{background:var(--accent-contrast);color:var(--accent)}
@media (max-width:560px){.home-hero .hh-text{max-width:88%}.home-hero h2{font-size:22px}}
:focus-visible{outline:3px solid var(--accent2);outline-offset:2px}
/* ================= アニメーション & UI強化 ================= */
@keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes riseIn{from{opacity:0;transform:translateY(16px) scale(.985)}to{opacity:1;transform:none}}
@keyframes popIn{0%{opacity:0;transform:scale(.9)}60%{transform:scale(1.02)}100%{opacity:1;transform:scale(1)}}
@keyframes ripple{to{transform:scale(2.4);opacity:0}}
@keyframes sheen{0%{transform:translateX(-120%)}60%,100%{transform:translateX(220%)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes floatX{0%{transform:translateX(-3%)}100%{transform:translateX(3%)}}
@keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 0 rgba(255,207,63,0))}50%{filter:drop-shadow(0 0 8px rgba(255,207,63,.7))}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes shimmer{100%{background-position:200% 0}}
@keyframes spinIn{from{opacity:0;transform:rotate(-6deg) scale(.8)}to{opacity:1;transform:none}}

/* 画面遷移 */
#main.view-in{animation:viewIn .34s cubic-bezier(.22,.61,.36,1) both}
html{scroll-behavior:smooth}

/* テーマ/色のなめらか切替 */
body,.card,.btn,.panel,.info-box,.tl-card,.map-wrap,.rally-hero,.booklet,.modal,.ach,.fav-row,.geo-chip,.day-block,.spot-edit{transition:background-color .4s ease,color .35s ease,border-color .4s ease}

/* カード等の登場スタガー */
.grid>.card,.timeline>.tl-item,.ach-grid>.ach,.fav-list>.fav-row,.plan-grid>.plan-card,.reg-list>.reg-row,.fav-trip-grid>.fav-trip,.ms-list>.ms-item,.day-view{animation:riseIn .5s cubic-bezier(.22,.61,.36,1) both}
.grid>.card:nth-child(1),.timeline>.tl-item:nth-child(1),.ach-grid>.ach:nth-child(1){animation-delay:.02s}
.grid>.card:nth-child(2),.timeline>.tl-item:nth-child(2),.ach-grid>.ach:nth-child(2){animation-delay:.06s}
.grid>.card:nth-child(3),.timeline>.tl-item:nth-child(3),.ach-grid>.ach:nth-child(3){animation-delay:.10s}
.grid>.card:nth-child(4),.timeline>.tl-item:nth-child(4),.ach-grid>.ach:nth-child(4){animation-delay:.14s}
.grid>.card:nth-child(5),.timeline>.tl-item:nth-child(5),.ach-grid>.ach:nth-child(5){animation-delay:.18s}
.grid>.card:nth-child(6),.timeline>.tl-item:nth-child(6),.ach-grid>.ach:nth-child(6){animation-delay:.22s}
.grid>.card:nth-child(7),.ach-grid>.ach:nth-child(7){animation-delay:.26s}
.grid>.card:nth-child(8),.ach-grid>.ach:nth-child(8){animation-delay:.30s}
.ach-grid>.ach:nth-child(n+9){animation-delay:.34s}

/* リップル */
.btn,.mini,.choice-card,.fab,.tab,.mt-btn,.mini-map{position:relative;overflow:hidden}
.rip{position:absolute;border-radius:50%;background:currentColor;opacity:.28;transform:scale(0);pointer-events:none;animation:ripple .6s ease-out forwards;mix-blend-mode:overlay}
.fab .rip,.btn .rip{background:#fff;opacity:.35}

/* ボタンの押下・ホバー */
.btn,.mini,.mt-btn,.mini-map,.icon-btn,.fav-btn,.tl-visit,.tl-fav{transition:transform .12s ease,box-shadow .18s ease,background-color .18s ease,color .18s ease,filter .18s}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.14)}
.btn:active,.mini:active,.mt-btn:active,.icon-btn:active,.mini-map:active{transform:scale(.95)}
.fab{transition:transform .16s ease,box-shadow .2s}
.fab:hover{transform:translateY(-2px) scale(1.04)}
.fab:active{transform:scale(.96)}

/* カード表紙のイラストをホバーで少し動かす */
.card{transition:transform .2s ease,box-shadow .2s ease}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.card:hover .cov-illust{transform:scale(1.06) rotate(-2deg)}
.card .cov-illust{transition:transform .35s ease}

/* タブ：アニメ下線 */
.tab::after{content:"";position:absolute;left:16px;right:16px;bottom:6px;height:3px;border-radius:3px;background:var(--accent);transform:scaleX(0);transform-origin:center;transition:transform .28s cubic-bezier(.22,.61,.36,1);opacity:.9}
.tab[aria-selected="true"]::after{transform:scaleX(1)}
.tab[aria-selected="true"] .tab-ico{animation:popIn .3s ease both}

/* 進捗バー：伸びる＋シマー */
.progress{overflow:hidden}
.progress i{transform-origin:left;animation:barGrow .8s cubic-bezier(.22,.61,.36,1) both;position:relative}
.progress i::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);transform:translateX(-120%);animation:sheen 2.6s ease-in-out .6s infinite}

/* 制覇マップ：塗りの変化＆選択のパルス */
.jpsvg path.gp,.munisvg path.gp,.worldsvg path.gp{transition:fill .5s ease,opacity .3s}
.jpsvg path.gp.sel{animation:glowPulse 1.6s ease-in-out infinite}
.favmark{animation:glowPulse 2.2s ease-in-out infinite}

/* ヒーロー：装飾の浮遊＋光沢スイープ */
.home-hero .hh-decor{animation:floatX 6s ease-in-out infinite alternate}
.home-hero::after{content:"";position:absolute;top:0;left:0;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.18),transparent);transform:translateX(-120%);animation:sheen 5.5s ease-in-out 1s infinite;pointer-events:none;z-index:1}
.rally-hero .geo-stat b{display:inline-block}

/* モーダル/トースト */
.modal{animation:popIn .26s cubic-bezier(.22,.61,.36,1) both}
.toast.show{animation:popIn .3s ease both}

/* ルーレット窓の光 */
.rl-window{position:relative}
.rl-window::before{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent,rgba(255,255,255,.16),transparent);transform:translateX(-120%);animation:sheen 2.4s ease-in-out infinite;pointer-events:none}

/* 実績アイコンの点灯演出 */
.ach.on .ach-ico{animation:spinIn .5s ease both}

/* お気に入り★のトグル演出 */
.fav-btn.on,.tl-fav.on{animation:popIn .32s ease}

/* 動きを控えたいユーザーには全アニメを抑制 */
/* スクロール連動の出現 */
.reveal{opacity:0;transform:translateY(22px)}
.reveal.in{opacity:1;transform:none;transition:opacity .6s ease,transform .7s cubic-bezier(.22,.61,.36,1)}
/* 制覇アニメーション再生 */
.replay-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin:2px 0 8px;flex-wrap:wrap}
.replay-count{font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
@keyframes prefPop{0%{opacity:.15}45%{opacity:1;filter:brightness(1.55)}100%{filter:none}}
.jpsvg path.gp.pref-pop{animation:prefPop .5s ease}
/* 季節エフェクト */
#season-fx{position:fixed;inset:0;pointer-events:none;z-index:6;overflow:hidden}
.sfx{position:absolute;top:-8vh;line-height:1;will-change:transform;filter:drop-shadow(0 1px 1px rgba(0,0,0,.06));animation-name:sfxFall;animation-timing-function:linear;animation-iteration-count:infinite}
@keyframes sfxFall{
  0%{transform:translate3d(0,-10vh,0) rotate(0deg)}
  25%{transform:translate3d(20px,20vh,0) rotate(90deg)}
  50%{transform:translate3d(-16px,45vh,0) rotate(180deg)}
  75%{transform:translate3d(18px,72vh,0) rotate(270deg)}
  100%{transform:translate3d(-10px,113vh,0) rotate(360deg)}
}
/* 季節セレクタ */
.season-sel{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:6px 0 4px}
.season-sel .sc{border:1.5px solid var(--border-strong);background:var(--surface);color:var(--text);border-radius:999px;padding:7px 14px;font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
.season-sel .sc.on{background:var(--accent);color:var(--accent-contrast);border-color:var(--accent)}
/* カテゴリ別おすすめチップ */
.cat-suggest{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:2px 0}
.cat-suggest:empty{display:none}
.cat-suggest .cs-lbl{font-size:11.5px;font-weight:800;color:var(--accent)}
.cs-chip{border:1.5px dashed var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--surface));color:var(--text);border-radius:999px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.cs-chip:hover{background:var(--accent);color:var(--accent-contrast)}
/* 使い方・Q&A */
.help-guide{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.help-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.help-card b{font-size:14.5px;display:block;margin-bottom:5px}
.help-card p{font-size:12.5px;color:var(--text-muted);margin:0;line-height:1.7}
.help-card b i,.help-card p b{color:var(--accent);font-style:normal}
.qa-list{display:flex;flex-direction:column;gap:10px}
.qa{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.qa summary{cursor:pointer;padding:13px 16px;font-weight:800;font-size:14px;list-style:none;position:relative;padding-right:40px}
.qa summary::-webkit-details-marker{display:none}
.qa summary::after{content:"＋";position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--accent);font-weight:800;transition:.2s}
.qa[open] summary::after{content:"−"}
.qa summary:hover{background:var(--surface2)}
.qa-a{padding:2px 16px 14px;font-size:13px;color:var(--text-muted);line-height:1.8}
.qa-a b{color:var(--text)}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
  #main.view-in{animation:none}
}</style>

function detectPref(text){
  if(!text)return"";
  for(const p of PREFS)if(text.includes(p.n))return p.n;
  for(const p of PREFS){const core=p.n.replace(/[都道府県]$/,"");if(core&&text.includes(core))return p.n;}
  return"";
}
let _cityIdx=null;
function cityPrefIndex(){
  if(_cityIdx)return _cityIdx;_cityIdx={};
  const M=(typeof window!=="undefined"&&window.MAPDATA&&window.MAPDATA.muni)||{};
  for(const pref in M)for(const m of M[pref]){if(!m.nm)continue;(_cityIdx[m.nm]=_cityIdx[m.nm]||[]).push(pref);}
  return _cityIdx;
}
function cityToPref(city,hint){if(!city)return"";const a=cityPrefIndex()[city];if(!a||!a.length)return"";if(a.length===1)return a[0];if(hint&&a.includes(hint))return hint;return a[0];}
// 都道府県名が住所に無くても、市区町村名から都道府県を逆引き（地図データを利用）
function detectPrefSmart(addr,hint){return detectPref(addr||"")||cityToPref(detectCity(addr||""),hint)||hint||"";}
function detectCity(addr){
  if(!addr)return"";
  const m=String(addr).match(/([\u3040-\u30ff\u4e00-\u9fff々ヶА-я]{1,8}?[市区町村])/);
  return m?m[1]:"";
}

function matchWorld(g){
  if(!g)return null;const q=String(g).trim();
  for(const c of WORLD)if(q.includes(c.n)||c.n.includes(q))return c.n;

}

function addDaysIso(iso,n){if(!iso)return"";const d=new Date(iso+"T00:00:00");if(isNaN(d))return"";d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function monthOf(iso){if(!iso)return 0;const d=new Date(iso+"T00:00:00");return isNaN(d)?0:d.getMonth()+1;}
const yen=n=>"¥"+Math.round(n).toLocaleString("ja-JP");

const SUG_TIMES=["9:00","10:30","12:00","13:30","15:00","16:30","18:30","20:00"];
const RELAX_TIMES=["10:00","11:30","13:00","14:30","16:00","17:30","19:00","20:30"];
function expandSpot(a){return{name:a[0],cat:a[1],tags:a[2]?a[2].split(","):[],note:a[3]||"",ticket:!!a[4]};}
function genericPool(area){return[
  ["定番の名所","sight","history",area+"を代表する見どころ。事前に調べておこう",0],
  ["人気の景勝地","nature","nature","景色を楽しめるスポット",0],
  ["ご当地グルメ","food","food","この土地ならではの味",0],
  ["話題のカフェ","cafe","food","ひと休みに",0],
  ["まち歩き・商店街","shop","shop,food","散策とおみやげ",0],
  ["文化・体験スポット","exp","activity","体験してみよう",0],
].map(expandSpot);}
function scoreByTags(list,tags){
  return list.map((s,i)=>({s,i,sc:s.tags.filter(t=>tags.includes(t)).length}))
    .sort((a,b)=>b.sc-a.sc||a.i-b.i).map(o=>o.s);
}

function buildSuggested(inp,opt){
  opt=opt||{};const slant=opt.slant||"standard";const offset=opt.offset||0;
  const db=findDestination(inp.dest);
  const area=db?db.area:(inp.dest||"目的地");
  const theme=db?db.theme:"wa", cover=db?db.cover:"mountains";
  const nights=Math.max(0,parseInt(inp.nights,10)||0);
  const totalDays=Math.max(1,nights+1), multi=totalDays>1;
  const pool=db?db.spots.map(expandSpot):genericPool(area);
  const ints=inp.interests||[];
  let sights=pool.filter(s=>s.cat!=="food");
  if(slant==="interest"){sights=scoreByTags(sights,ints.length?ints:["food","history","activity"]);}
  else if(slant==="relax"){sights=scoreByTags(sights,["relax","nature"]);}
  const foods=pool.filter(s=>s.cat==="food");
  const per=slant==="relax"?2:paceById(inp.pace).per;
  const TIMES=slant==="relax"?RELAX_TIMES:SUG_TIMES;
  let si=offset,fi=offset;
  const nextSight=()=>sights.length?sights[si++%sights.length]:{name:area+"の観光",cat:"sight",tags:[],note:"",ticket:false};
  const nextFood=fb=>foods.length?foods[fi++%foods.length]:{name:fb,cat:"food",tags:["food"],note:"",ticket:false};
  const chosen=[], days=[];
  const mkSpot=(name,cat,memo)=>({id:uid(),time:"",name,cat,addr:(spotCityFor(name,area)||area),memo:memo||"",dur:0,moveMode:"",moveNext:0,fav:false,visited:false,visitedAt:null});
  const arrivalName={air:"空港に到着",train:"現地の駅に到着",bus:"バスターミナルに到着",rentacar:"空港・駅でレンタカーを受取",car:"現地に到着（ドライブ）"}[inp.transport]||"現地に到着";

  for(let d=0;d<totalDays;d++){
    const isFirst=d===0, isLast=(d===totalDays-1)&&multi;
    const items=[];
    if(isFirst&&multi)items.push(mkSpot(arrivalName,"move","移動お疲れさま。まずは近くから観光"));
    const nS=Math.max(1,(isFirst||isLast)?per-1:per);
    const morning=Math.ceil(nS/2), afternoon=nS-morning;
    for(let k=0;k<morning;k++){const s=nextSight();items.push(mkSpot(s.name,s.cat,s.note));chosen.push(s);}
    const fl=nextFood("ご当地ランチ");items.push(mkSpot(fl.name,"food",fl.note||"昼食"));chosen.push(fl);
    if(slant==="relax")items.push(mkSpot("カフェでひと休み","cafe","のんびりティータイム"));
    for(let k=0;k<afternoon;k++){const s=nextSight();items.push(mkSpot(s.name,s.cat,s.note));chosen.push(s);}
    if(!isLast){
      const fd=nextFood("ご当地ディナー");items.push(mkSpot(fd.name,"food",fd.note||"夕食"));chosen.push(fd);
      items.push(mkSpot(area+"泊：予約した宿へ","stay",slant==="relax"?"温泉でゆっくり":"チェックイン・夕食を楽しむ"));
    }else if(multi){items.push(mkSpot("帰路へ（"+transportLabel(inp.transport)+"）","move","おみやげを買って出発"));}
    items.forEach((it,i)=>it.time=TIMES[i]||"");
    days.push({id:uid(),date:addDaysIso(inp.start,d),
      label:isFirst?(multi?"到着＆さんぽ":area+"を満喫"):(isLast?"最終日・帰路":area+"を満喫"),spots:items});
  }

  const m=monthOf(inp.start);const pk=["モバイルバッテリー","歯ブラシ・洗面用具","常備薬","現金・交通系ICカード"];
  if(ints.includes("relax")||slant==="relax")pk.push("着替え","タオル");
  if(ints.includes("nature")||ints.includes("activity"))pk.push("歩きやすい靴","レインウェア");
  if(nights>=1)pk.push("宿泊の着替え（"+nights+"泊分）");
  if(m>=12||m<=2)pk.push("防寒着・手袋");else if(m>=6&&m<=8)pk.push("日焼け止め・帽子");else if(m>=3&&m<=5)pk.push("羽織るもの（朝晩用）");else pk.push("羽織るもの");
  const packing=[...new Set(pk)].map(t=>({id:uid(),text:t,done:false}));

  const comp=companionById(inp.companion);
  const people=Math.max(1,parseInt(inp.people,10)||(comp?comp.people:2));
  const lodging=nights*9000;
  const trans={air:30000,train:15000,bus:6000,rentacar:8000*totalDays/people,car:4000}[inp.transport]||8000;
  const fooda=totalDays*(slant==="relax"?6000:5000);
  const budget=`1人あたり 約${yen(lodging+trans+fooda)}（宿泊${yen(lodging)}＋交通${yen(trans)}＋食事・観光${yen(fooda)}の目安）`;

  const reservations=buildReservations(inp,area,nights,totalDays,chosen);
  const base=nights===0?`${area}日帰り`:`${area} ${nights}泊${totalDays}日`;
  const suffix=opt.label?`（${opt.label}）`:"";
  const compNote=comp?`${comp.label}向け。`:"";
  const notes=compNote+"このしおりは「おすすめ提案」から自動作成されました。時間・スポットは目安です。予約リンク先で料金・営業時間・在庫を必ずご確認ください。";
  return Object.assign(blankTrip(),{
    id:uid(),title:base+suffix,dest:area+(inp.dest&&inp.dest!==area?` / ${inp.dest}`:""),theme,cover,country:"日本",pref:detectPref(area),
    start:inp.start||"",end:inp.start?addDaysIso(inp.start,totalDays-1):"",members:comp?`${comp.label}・${people}名`:people+"名",
    meet:(inp.origin?`${inp.origin} から `:"")+(inp.transport==="car"||inp.transport==="rentacar"?`${area}へ（${transportLabel(inp.transport)}）`:`${transportLabel(inp.transport)}で${area}へ`),
    budget,notes,packing,days,reservations,sample:false,updatedAt:Date.now(),createdAt:Date.now(),
    planLabel:opt.label||"",planDesc:opt.desc||""
  });
}

/* 3つの異なるプランを提案 */
function generateProposals(inp){
  const ints=inp.interests||[];
  const intLabel=ints.length?INTERESTS.filter(i=>ints.includes(i.id)).map(i=>i.label).slice(0,2).join("・"):"よくばり";
  const slants=[
    {slant:"standard",label:"王道・定番",desc:"人気スポットをバランスよくめぐる王道プラン"},
    {slant:"interest",label:intLabel+"重視",desc:"選んだ趣向を最優先。好きを詰め込むプラン"},
    {slant:"relax",label:"のんびり癒し",desc:"予定をゆったり。カフェや自然で癒されるプラン"},
  ];
  return slants.map((s,i)=>buildSuggested(inp,{slant:s.slant,label:s.label,desc:s.desc,offset:i}));
}

function buildReservations(inp,area,nights,totalDays,chosen){
  const r=[];const add=(label,why,links,optional)=>r.push({id:uid(),label,why:why||"",links:links||[],done:false,optional:!!optional});
  const org=(inp.origin||"").trim();
  const from=org?`${org}発：`:"";
  if(org){
    const mapsDir={name:"Google マップ 経路",url:`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(org)}&destination=${encodeURIComponent(area)}`};
    add("出発地からの経路・所要時間を確認",`${org} → ${area} のルートと所要時間・運賃の目安を確認。`,[mapsDir,L.transit]);
  }
  switch(inp.transport){

/* ---------- 写真ストア（IndexedDB / 不可時メモリ） ---------- */
const PhotoStore = {
  _db:null,_mem:new Map(),_useMem:false,_ready:null,
  open(){
    if(this._ready)return this._ready;
    this._ready=new Promise(res=>{
      if(typeof indexedDB==="undefined"){this._useMem=true;return res();}
      let req; try{req=indexedDB.open("tabiPhotos_v2",1);}catch(e){this._useMem=true;return res();}
      req.onupgradeneeded=e=>{const db=e.target.result;
        if(!db.objectStoreNames.contains("photos")){const os=db.createObjectStore("photos",{keyPath:"id"});os.createIndex("trip","tripId",{unique:false});}};
      req.onsuccess=e=>{this._db=e.target.result;res();};
      req.onerror=()=>{this._useMem=true;res();};
    });
    return this._ready;
  },
  async add(p){await this.open();
    if(this._useMem){this._mem.set(p.id,p);return p;}
    return new Promise((res,rej)=>{const tx=this._db.transaction("photos","readwrite");tx.objectStore("photos").put(p);tx.oncomplete=()=>res(p);tx.onerror=()=>rej(tx.error);});},
  async listByTrip(tripId){await this.open();
    if(this._useMem)return [...this._mem.values()].filter(p=>p.tripId===tripId).sort((a,b)=>a.createdAt-b.createdAt);
    return new Promise(res=>{const out=[];const idx=this._db.transaction("photos").objectStore("photos").index("trip");
      idx.openCursor(IDBKeyRange.only(tripId)).onsuccess=e=>{const c=e.target.result;if(c){out.push(c.value);c.continue();}else res(out.sort((a,b)=>a.createdAt-b.createdAt));};});},
  async countByTrip(tripId){const l=await this.listByTrip(tripId);return l.length;},
  async remove(id){await this.open();
    if(this._useMem){this._mem.delete(id);return;}
    return new Promise(res=>{const tx=this._db.transaction("photos","readwrite");tx.objectStore("photos").delete(id);tx.oncomplete=()=>res();});},
  async removeByTrip(tripId){const l=await this.listByTrip(tripId);for(const p of l)await this.remove(p.id);},
};

function fileToDataUrl(file,maxDim=1400,quality=.82){
  return new Promise((res,rej)=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
      const s=Math.min(1,maxDim/Math.max(w,h));const cw=Math.max(1,Math.round(w*s)),ch=Math.max(1,Math.round(h*s));
      const cv=document.createElement("canvas");cv.width=cw;cv.height=ch;
      cv.getContext("2d").drawImage(img,0,0,cw,ch);URL.revokeObjectURL(url);
      try{res(cv.toDataURL("image/jpeg",quality));}catch(e){rej(e);}};
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error("画像を読み込めません"));};
    img.src=url;
  });
}

function parseMin(t){const m=String(t||"").match(/^(\d{1,2})\s*[:：]\s*(\d{1,2})$/);if(!m)return null;return (+m[1])*60+(+m[2]);}

const MODES=[{id:"walk",label:"徒歩",emoji:"🚶",gm:"walking",af:"w",sp:4.5,ov:0},{id:"car",label:"車",emoji:"🚗",gm:"driving",af:"d",sp:30,ov:0},{id:"train",label:"電車",emoji:"🚃",gm:"transit",af:"r",sp:52,ov:15},{id:"bus",label:"バス",emoji:"🚌",gm:"transit",af:"r",sp:20,ov:8}];
const modeById=id=>MODES.find(m=>m.id===id)||MODES[1];
function defaultMode(trip){return {air:"train",train:"train",bus:"bus",rentacar:"car",car:"car"}[trip&&trip.transport]||"car";}
// 市区町村・都道府県の重心（地図データのパスbbox中心）を利用して座標を推定
function _centroid(d){if(!d)return null;const ns=d.match(/-?\d+(?:\.\d+)?/g);if(!ns||ns.length<4)return null;let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;for(let i=0;i+1<ns.length;i+=2){const x=+ns[i],y=+ns[i+1];if(x<x0)x0=x;if(x>x1)x1=x;if(y<y0)y0=y;if(y>y1)y1=y;}return [(x0+x1)/2,(y0+y1)/2];}
let _prefC=null,_muniC={};
function prefCentroid(pref){if(!pref)return null;if(!_prefC){_prefC={};const P=(typeof window!=="undefined"&&window.MAPDATA&&window.MAPDATA.prefPaths)||[];P.forEach(p=>_prefC[p.n]=_centroid(p.d));}return _prefC[pref]||null;}
function muniCentroid(pref,city){if(!pref||!city)return null;if(!_muniC[pref]){_muniC[pref]={};const L=(typeof window!=="undefined"&&window.MAPDATA&&window.MAPDATA.muni&&window.MAPDATA.muni[pref])||[];L.forEach(m=>{if(m.nm&&!_muniC[pref][m.nm])_muniC[pref][m.nm]=_centroid(m.d);});}
  if(_muniC[pref][city])return _muniC[pref][city];for(const k in _muniC[pref])if(k.includes(city)||city.includes(k))return _muniC[pref][k];return null;}
let _kpu=null;
function kmPerUnit(){if(_kpu)return _kpu;const a=prefCentroid("東京都"),b=prefCentroid("大阪府");_kpu=(a&&b)?(400/(Math.hypot(a[0]-b[0],a[1]-b[1])||1600)):0.25;return _kpu;}
function spotCoord(s,tripPref){if(!s)return null;const p=detectPrefSmart(s.addr,tripPref);const c=detectCity(s.addr||"");return (c&&muniCentroid(p,c))||prefCentroid(p)||null;}
// 所要時間の概算（移動手段別・座標が取れれば距離ベース／不明時は地理段階×手段係数）
function estimateTravel(a,b,tripPref,mode){
  if(!a||!b)return 0;
  const M=modeById(mode||"car");
  if(a.cat==="move"||b.cat==="move")return 10;
  if(a.cat==="stay")return 15;
  const A=spotCoord(a,tripPref),B=spotCoord(b,tripPref);
  if(A&&B){const km=Math.hypot(A[0]-B[0],A[1]-B[1])*kmPerUnit();let t=km/M.sp*60+M.ov;t=Math.max(5,t);return Math.round(t/5)*5;}
  const ap=detectPrefSmart(a.addr,tripPref),bp=detectPrefSmart(b.addr,tripPref),ac=detectCity(a.addr||""),bc=detectCity(b.addr||"");
  let base=(ac&&bc&&ac===bc)?15:(ap&&bp&&ap===bp?40:100);
  const f={walk:2.5,car:1,train:0.85,bus:1.4}[M.id]||1;
  return Math.max(5,Math.round(base*f/5)*5);
}
// 最近傍法で効率的な訪問順に並べ替え
function nnOrder(list,tripPref){
  const items=list.map(s=>({s,xy:spotCoord(s,tripPref)}));
  const withXY=items.filter(o=>o.xy),without=items.filter(o=>!o.xy);
  if(withXY.length<=2)return list.slice();
  const out=[];let cur=withXY.shift();out.push(cur);
  while(withXY.length){let bi=0,bd=Infinity;for(let i=0;i<withXY.length;i++){const dx=cur.xy[0]-withXY[i].xy[0],dy=cur.xy[1]-withXY[i].xy[1],d=dx*dx+dy*dy;if(d<bd){bd=d;bi=i;}}cur=withXY.splice(bi,1)[0];out.push(cur);}
  return out.map(o=>o.s).concat(without.map(o=>o.s));
}
function mapsQuery(s,area){return encodeURIComponent(((s&&s.name)||"")+(area?(" "+area):"")).replace(/'/g,"%27");}
function routeLegUrl(a,b,trip,mode){const area=(trip&&(trip.pref||trip.dest))||"";const gm=modeById(mode||defaultMode(trip)).gm;
  return `https://www.google.com/maps/dir/?api=1&origin=${mapsQuery(a,area)}&destination=${mapsQuery(b,area)}&travelmode=${gm}`;}
function buildRoute(spots,provider,trip){
  const area=(trip&&(trip.pref||trip.dest))||"";
  const pts=(spots||[]).filter(s=>s&&s.name&&s.cat!=="move");
  if(pts.length<2)return null;
  const dm=defaultMode(trip);
  if(provider==="apple"){
    const dirflg=modeById(dm).af;
    const saddr=mapsQuery(pts[0],area);
    const daddr=pts.slice(1).map(s=>mapsQuery(s,area)).join("%20to:");
    return `https://maps.apple.com/?saddr=${saddr}&daddr=${daddr}&dirflg=${dirflg}`;
  }
  const o=mapsQuery(pts[0],area),d=mapsQuery(pts[pts.length-1],area);
  const wp=pts.slice(1,-1).slice(0,9).map(s=>mapsQuery(s,area)).join("%7C");
  return `https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}&travelmode=${modeById(dm).gm}${wp?`&waypoints=${wp}`:""}`;
}

  initScrollReveal(){

    if(!this._io)return;const m=document.getElementById("main");if(!m)return;

  seasonMode(){try{return localStorage.getItem("tabi_season_fx")||"auto";}catch(e){return "auto";}},
  setSeason(v){try{localStorage.setItem("tabi_season_fx",v);}catch(e){}this.renderSeasonFx();if(this.view==="themes")this.go("themes");toast(v==="off"?"季節の演出をオフにしました":"季節の演出を更新しました");},
  currentSeason(){const m=new Date().getMonth()+1;if(m>=3&&m<=5)return "sakura";if(m>=6&&m<=8)return "sparkle";if(m>=9&&m<=11)return "leaves";return "snow";},
  renderSeasonFx(){
    const old=document.getElementById("season-fx");if(old)old.remove();
    const reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let mode=this.seasonMode();if(mode==="off"||reduce)return;
    if(mode==="auto")mode=this.currentSeason();
    const conf={sakura:{ch:["🌸","🌸","🌼"],n:16,dur:[9,16],size:[14,26]},snow:{ch:["❄","❅","•"],n:20,dur:[7,13],size:[10,20]},leaves:{ch:["🍁","🍂","🍃"],n:14,dur:[8,15],size:[16,28]},sparkle:{ch:["✨","·","˖"],n:16,dur:[6,12],size:[10,22]}}[mode];
    if(!conf)return;
    const layer=document.createElement("div");layer.id="season-fx";
    for(let i=0;i<conf.n;i++){const s=document.createElement("span");s.className="sfx";s.textContent=conf.ch[i%conf.ch.length];
      const dur=conf.dur[0]+Math.random()*(conf.dur[1]-conf.dur[0]);
      s.style.left=Math.random()*100+"vw";s.style.fontSize=(conf.size[0]+Math.random()*(conf.size[1]-conf.size[0]))+"px";
      s.style.animationDuration=dur.toFixed(1)+"s";s.style.animationDelay=(-Math.random()*dur).toFixed(1)+"s";s.style.opacity=(.5+Math.random()*.45).toFixed(2);
      layer.appendChild(s);}
    document.body.appendChild(layer);
  },
  /* 制覇アニメーション再生 */
  replayConquest(){
    const svg=document.querySelector(".jpsvg");if(!svg||this._replaying)return;
    const ons=[...svg.querySelectorAll("path.gp.on")];if(!ons.length){toast("まだ塗られた県がありません");return;}
    this._replaying=true;const counter=document.getElementById("replay-count");
    ons.forEach(p=>p.classList.remove("on"));if(counter)counter.textContent="0/"+PREFS.length;
    let i=0;const step=()=>{
      if(i>=ons.length){this._replaying=false;this.celebrate();if(counter)counter.textContent=ons.length+"/"+PREFS.length;return;}
      const p=ons[i];p.classList.add("on","pref-pop");setTimeout(()=>p.classList.remove("pref-pop"),500);
      if(counter)counter.textContent=(i+1)+"/"+PREFS.length;i++;setTimeout(step,150);
    };
    setTimeout(step,200);
  },
  countUp(el){const to=parseFloat(el.getAttribute("data-count"))||0;
    if(!("requestAnimationFrame"in window)||to<=0){el.textContent=String(to);return;}
    const dur=750,st=(performance&&performance.now)?performance.now():Date.now();
    const step=now=>{const t=(now||Date.now());const p=Math.min(1,(t-st)/dur);const val=Math.round(to*(1-Math.pow(1-p,3)));el.textContent=String(val);if(p<1)requestAnimationFrame(step);};
    requestAnimationFrame(step);
  },
  initRipple(){document.addEventListener("pointerdown",e=>{
    const t=e.target.closest&&e.target.closest(".btn,.mini,.choice-card,.fab,.tab,.mt-btn,.mini-map");
    if(!t||t.classList.contains("no-rip"))return;
    const r=t.getBoundingClientRect();const size=Math.max(r.width,r.height)*1.2;
    const s=document.createElement("span");s.className="rip";s.style.width=s.style.height=size+"px";
    s.style.left=(e.clientX-r.left-size/2)+"px";s.style.top=(e.clientY-r.top-size/2)+"px";
    t.appendChild(s);setTimeout(()=>s.remove(),620);
  },true);},

  catSuggestions(cat,trip){
    const dest=(trip&&trip.dest)||"";const area=(trip&&(trip.pref||detectPref(trip.dest||"")))||"";
    let db=dest?findDestination(dest):null;
    if(!db&&area){for(const k in DESTINATIONS)if(DESTINATIONS[k].area===area){db=DESTINATIONS[k];break;}}
    const out=[];const seen=new Set();
    const push=(nm,ar)=>{if(!seen.has(nm)){seen.add(nm);out.push({name:nm,addr:ar});}};
    if(db){for(const sp of db.spots)if(sp[1]===cat)push(sp[0],spotCityFor(sp[0],db.area)||db.area);
      if(out.length<3){const grp=(CATS.find(c=>c.id===cat)||{}).grp;for(const sp of db.spots){const sc=CATS.find(c=>c.id===sp[1]);if(sc&&sc.grp===grp)push(sp[0],spotCityFor(sp[0],db.area)||db.area);}}}
    if(!out.length){(GENERIC_SUGGEST[cat]||[]).forEach(n=>push(n,area||""));}
    return out.slice(0,6);
  },
  catSuggestHtml(di,si,cat){
    const sug=this.catSuggestions(cat,this.editing);this._catSug=this._catSug||{};this._catSug[di+"-"+si]=sug;

    return `<span class="cs-lbl">✨ おすすめ</span>${sug.map((s,i)=>`<button type="button" class="cs-chip" onclick="App.pickCatSug(${di},${si},${i})">＋ ${esc(s.name)}</button>`).join("")}`;
  },
  renderCatSuggest(di,si,cat){const el=document.getElementById("cs"+di+"-"+si);if(el)el.innerHTML=this.catSuggestHtml(di,si,cat);},
  pickCatSug(di,si,i){const s=(this._catSug&&this._catSug[di+"-"+si]||[])[i];if(!s)return;

    toast("「"+s.name+"」を入力しました");

  editSpotCat(di,si,v){this.editing.days[di].spots[si].cat=v;this.renderCatSuggest(di,si,v);},
  editSpotName(di,si,v){const sp=this.editing.days[di].spots[si];sp.name=v;
